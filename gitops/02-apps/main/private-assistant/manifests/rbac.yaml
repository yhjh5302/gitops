apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: private-assistant-cluster-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: private-assistant-cluster-reader-binding
subjects:
- kind: ServiceAccount
  name: default
  namespace: private-assistant
roleRef:
  kind: ClusterRole
  name: private-assistant-cluster-reader
  apiGroup: rbac.authorization.k8s.io
