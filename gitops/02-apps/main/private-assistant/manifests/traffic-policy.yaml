apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: private-assistant-auth
  namespace: private-assistant
spec:
  extAuth:
    extensionRef:
      name: oauth2-proxy-ext
      namespace: kgateway
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: private-assistant-secure-route
