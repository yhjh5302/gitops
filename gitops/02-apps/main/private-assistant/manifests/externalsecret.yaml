apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: private-assistant-secrets
  namespace: private-assistant
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: private-assistant-secrets
    creationPolicy: Owner
  data:
  - secretKey: huggingface-token
    remoteRef:
      key: private-assistant
      property: huggingface-token
