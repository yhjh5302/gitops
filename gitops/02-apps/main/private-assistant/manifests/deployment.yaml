apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-assistant
  namespace: private-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: private-assistant
  template:
    metadata:
      labels:
        app: private-assistant
    spec:
      containers:
      - name: assistant
        # Client frontend interface and Go Backend unified container
        image: harbor.jin-server.com/docker.io/private-assistant:v1.0.0
        env:
        - name: QWEN_API_URL
          value: "http://qwen-serving.private-assistant.svc:4000/v1"
        - name: GEMMA_API_URL
          value: "http://gemma-serving.private-assistant.svc:11434/v1"
        - name: HIGGS_API_URL
          value: "http://higgs-serving.private-assistant.svc:8000/v1/audio/speech"
        - name: WHISPER_API_URL
          value: "http://whisper-serving.private-assistant.svc:8000/v1/audio/transcriptions"
        - name: DB_HOST
          value: "postgres.postgres.svc"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "private_assistant"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: private-assistant-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: private-assistant-secrets
              key: db-password
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: private-assistant-secrets
              key: huggingface-token
        ports:
        - containerPort: 8000
          name: http
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: private-assistant
  namespace: private-assistant
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: private-assistant
