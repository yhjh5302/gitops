apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-serving-router
  namespace: private-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-serving-router
  template:
    metadata:
      labels:
        app: qwen-serving-router
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "jin-vm"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: vllm-router
          image: vllm/vllm-router:nightly
          command: ["vllm-router"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "4000"
            - "--worker-urls"
            - "http://qwen-serving-worker.private-assistant.svc:8000"
            - "--policy"
            - "cache_aware"
            - "--cache-threshold"
            - "0.3"
            - "--balance-abs-threshold"
            - "64"
            - "--balance-rel-threshold"
            - "1.5"
          ports:
            - containerPort: 4000
              name: http
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
