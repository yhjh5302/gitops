apiVersion: v1
kind: ServiceAccount
metadata:
  name: qwen-serving
  namespace: private-assistant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-serving
  namespace: private-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qwen-serving
  template:
    metadata:
      labels:
        app: qwen-serving
    spec:
      serviceAccountName: qwen-serving
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "jin-vm"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: vllm-qwen
          image: vllm/vllm-openai:v0.24.0
          command: ["vllm", "serve"]
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: private-assistant-secrets
                  key: huggingface-token
          args:
            - "Qwen/Qwen3.5-9B"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --gpu-memory-utilization
            - "0.92"
            - --max-model-len
            - "32768"
            - --max-num-seqs
            - "64"
            - --quantization
            - "fp8"
            - --enforce-eager
            - --enable-auto-tool-choice
            - --tool-call-parser
            - "qwen3_coder"
            - --served-model-name
            - "qwen-3.5-9b"
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 360
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 15
          resources:
            limits:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: 1
            requests:
              cpu: "4"
              memory: "12Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: huggingface-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
        - name: huggingface-cache
          persistentVolumeClaim:
            claimName: qwen-model-cache-pvc
