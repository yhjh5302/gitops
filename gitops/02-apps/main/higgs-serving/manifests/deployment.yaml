apiVersion: v1
kind: ServiceAccount
metadata:
  name: higgs-serving
  namespace: private-assistant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: higgs-serving
  namespace: private-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: higgs-serving
  template:
    metadata:
      labels:
        app: higgs-serving
    spec:
      serviceAccountName: higgs-serving
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "jin-server"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      initContainers:
        - name: download-model
          image: lmsysorg/sglang-omni:dev
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Downloading Higgs model..."
              hf download bosonai/higgs-tts-3-4b
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: private-assistant-secrets
                  key: huggingface-token
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
              subPath: huggingface
      containers:
        - name: higgs
          image: lmsysorg/sglang-omni:dev
          command: ["/bin/zsh", "-c"]
          args:
            - |
              (
                until curl -s http://127.0.0.1:8000/health > /dev/null; do
                  sleep 2
                done
                curl -s -X POST http://127.0.0.1:8000/v1/audio/speech \
                  -H "Content-Type: application/json" \
                  -d '{"model": "bosonai/higgs-tts-3-4b", "input": "warmup"}' > /dev/null
              ) &
              mkdir -p /workspace
              if [ ! -d "/workspace/sglang-omni" ]; then
                git clone https://github.com/sgl-project/sglang-omni.git /workspace/sglang-omni
              fi
              cd /workspace/sglang-omni
              if [ ! -f "$UV_PROJECT_ENVIRONMENT/bin/activate" ]; then
                uv venv -p 3.12
                source "$UV_PROJECT_ENVIRONMENT/bin/activate"
                uv pip install -v .
              else
                source "$UV_PROJECT_ENVIRONMENT/bin/activate"
              fi
              exec sgl-omni serve --model-path bosonai/higgs-tts-3-4b --host 0.0.0.0 --port 8000
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: private-assistant-secrets
                  key: huggingface-token
            - name: UV_CACHE_DIR
              value: "/root/.cache/uv"
            - name: UV_PROJECT_ENVIRONMENT
              value: "/root/.cache/venv"
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 360
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 15
          resources:
            limits:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: 1
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /root/.cache/huggingface
              subPath: huggingface
            - name: model-cache
              mountPath: /root/.triton/cache
              subPath: triton
            - name: venv-cache
              mountPath: /root/.cache/uv
              subPath: uv
            - name: venv-cache
              mountPath: /root/.cache/venv
              subPath: venv
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: model-cache
          persistentVolumeClaim:
            claimName: higgs-model-cache-pvc
        - name: venv-cache
          persistentVolumeClaim:
            claimName: higgs-venv-cache-pvc
