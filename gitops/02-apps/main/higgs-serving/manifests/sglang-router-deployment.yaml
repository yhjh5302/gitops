apiVersion: apps/v1
kind: Deployment
metadata:
  name: higgs-serving-router
  namespace: private-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: higgs-serving-router
  template:
    metadata:
      labels:
        app: higgs-serving-router
    spec:
      serviceAccountName: higgs-serving
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "jin-server"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: sglang-router
          image: lmsysorg/sglang-omni:dev
          command: ["/bin/zsh", "-c"]
          args:
            - |
              mkdir -p /workspace
              if [ ! -d "/workspace/sglang-omni" ]; then
                git clone https://github.com/sgl-project/sglang-omni.git /workspace/sglang-omni
              fi
              PYTHONPATH=/workspace/sglang-omni python3 -m sglang_omni_router.serve \
                --host 0.0.0.0 \
                --port 8000 \
                --worker-urls http://higgs-serving-worker.private-assistant.svc:8080 \
                --policy least_request \
                --model bosonai/higgs-tts-3-4b \
                --health-failure-threshold 2 \
                --health-success-threshold 1 \
                --health-check-interval-secs 10 \
                --max-payload-size 536870912
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
