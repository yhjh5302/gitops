apiVersion: apps/v1
kind: Deployment
metadata:
  name: higgs-serving-router
  namespace: private-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: higgs-serving-router
  template:
    metadata:
      labels:
        app: higgs-serving-router
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "jin-server"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: sglang-router
          image: lmsysorg/sglang-omni:dev
          command: ["python3", "-m", "sglang_router.launch_router"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--worker-urls"
            - "http://higgs-serving-worker.private-assistant.svc:8080"
            - "--policy"
            - "cache_aware"
            - "--cache-threshold"
            - "0.3"
            - "--balance-abs-threshold"
            - "64"
            - "--balance-rel-threshold"
            - "1.5"
            - "--tokenizer-path"
            - "bosonai/higgs-tts-3-4b"
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
