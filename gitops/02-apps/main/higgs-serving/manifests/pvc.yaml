apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: higgs-model-cache-pvc
  namespace: private-assistant
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: higgs-venv-cache-pvc
  namespace: private-assistant
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
