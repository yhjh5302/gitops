              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ListenerPolicySpec defines the desired state of a listener
              policy.
            properties:
              default:
                description: |-
