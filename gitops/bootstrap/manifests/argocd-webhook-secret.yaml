apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-webhook-secret
  namespace: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge # Merge directly into the existing argocd-secret created by Helm
    template:
      engineVersion: v2
      data:
        webhook.github.secret: "{{ .webhook_github_secret }}"
        oidc.keycloak.clientSecret: "{{ .oidc_client_secret }}"
  data:
  - secretKey: webhook_github_secret
    remoteRef:
      key: gitops/argocd-webhook
      property: webhook.github.secret
  - secretKey: oidc_client_secret
    remoteRef:
      key: argocd
      property: client-secret
