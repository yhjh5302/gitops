apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-main-applicationset
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: 'https://github.com/yhjh5302/gitops.git'
      revision: HEAD
      directories:
      - path: gitops/01-system/main/*
      - path: gitops/02-apps/main/*
      - path: gitops/02-apps/main/gemma-serving
        exclude: true
      - path: gitops/02-apps/main/qwen-serving
        exclude: true
      - path: gitops/02-apps/main/higgs-serving
        exclude: true
  template:
    metadata:
      name: 'root-main-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/yhjh5302/gitops.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
        - /spec/resources/requests/storage
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
