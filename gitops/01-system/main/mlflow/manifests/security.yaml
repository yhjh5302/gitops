apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: mlflow-security
  namespace: mlflow
spec:
  endpointSelector:
    matchLabels:
      app: mlflow
  ingress:
    # 1. Allow Kubelet health check on HTTP port 5000
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow L7 HTTP traffic from Ingress Gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": istio-system
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: mlflow-security-policy
  namespace: mlflow
spec:
  selector:
    matchLabels:
      app: mlflow
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probe
    - to:
      - operation:
          ports: ["5000"]
    # Rule B: Allow access from Management Ingress Gateway
    - from:
      - source:
          principals: ["cluster.local/ns/istio-system/sa/management-gateway-istio"]
      to:
      - operation:
          ports: ["5000"]
