apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: keycloak-security
  namespace: keycloak
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  ingress:
    # 1. Allow Kubelet health check on HTTP port 9000
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow L7 HTTP traffic from Ingress Gateway, private-assistant, oauth2-proxy, and victoria-metrics
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": istio-system
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": private-assistant
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": oauth2-proxy
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": victoria-metrics
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "9000"
              protocol: TCP
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: keycloak-security-policy
  namespace: keycloak
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes on management port
    - to:
      - operation:
          ports: ["9000"]
    # Rule B: Allow keycloak access from Management Ingress Gateway, OAuth2-Proxy, Web App, and Grafana
    - from:
      - source:
          principals:
            - "cluster.local/ns/istio-system/sa/management-gateway-istio"
            - "cluster.local/ns/private-assistant/sa/private-assistant"
            - "cluster.local/ns/oauth2-proxy/sa/oauth2-proxy"
            - "cluster.local/ns/victoria-metrics/sa/victoria-metrics-grafana"
      to:
      - operation:
          ports: ["8080"]
    # Rule C: Allow VictoriaMetrics metrics scraping
    - from:
      - source:
          principals: ["cluster.local/ns/victoria-metrics/sa/vmagent-victoria-metrics"]
      to:
      - operation:
          ports: ["9000"]
