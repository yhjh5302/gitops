apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: main-postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # Run in wave 1 (before dependent services)
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # GitOps repository URL
    repoURL: 'https://github.com/yhjh5302/gitops.git'
    targetRevision: HEAD
    path: gitops/01-system/main/postgres/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - SkipDryRunOnMissingResource=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
