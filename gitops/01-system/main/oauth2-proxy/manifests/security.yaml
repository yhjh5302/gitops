apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: oauth2-proxy-security
  namespace: oauth2-proxy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  ingress:
    # 1. Allow Kubelet health check on HTTP port 4180
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow L7 HTTP traffic from Ingress Gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": istio-system
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
    # 4. Allow VictoriaMetrics metrics scraping
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": victoria-metrics
      toPorts:
        - ports:
            - port: "44180"
              protocol: TCP
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: oauth2-proxy-security-policy
  namespace: oauth2-proxy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes on port 4180
    - to:
      - operation:
          methods: ["GET"]
          ports: ["4180"]
          paths: ["/ping", "/ready"]
    # Rule B: Allow access from Ingress Gateways to oauth2-proxy
    - from:
      - source:
          principals:
            - "cluster.local/ns/istio-system/sa/service-gateway-istio"
            - "cluster.local/ns/istio-system/sa/management-gateway-istio"
      to:
      - operation:
          ports: ["4180"]
          hosts:
            - "oauth2-proxy.oauth2-proxy.svc.cluster.local"
            - "private-assistant.jin-server.com"
            - "argocd.jin-server.com"
            - "grafana.jin-server.com"
            - "workflows.jin-server.com"
            - "code.jin-server.com"
    # Rule C: Allow VictoriaMetrics metrics scraping
    - from:
      - source:
          principals: ["cluster.local/ns/victoria-metrics/sa/vmagent-victoria-metrics"]
      to:
      - operation:
          ports: ["44180"]
