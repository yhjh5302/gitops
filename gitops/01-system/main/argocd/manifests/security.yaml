apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: argocd-server-security
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  ingress:
    # 1. Allow Kubelet health check on HTTP port 8080
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow L7 HTTP traffic from Ingress Gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": istio-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: argocd-repo-server-security
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  ingress:
    # 1. Allow Kubelet health check on HTTP port 8084
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8084"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow gRPC traffic from argocd-server and argocd-application-controller
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: argocd-server
        - matchLabels:
            app.kubernetes.io/name: argocd-application-controller
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: argocd-security-policy
  namespace: argocd
spec:
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health checks on server and repo-server
    - to:
      - operation:
          methods: ["GET"]
          ports: ["8080", "8084"]
          paths: ["/healthz", "/healthz?full=true"]
    # Rule B: Allow access from Management Ingress Gateway to argocd-server
    - from:
      - source:
          principals: ["cluster.local/ns/istio-system/sa/management-gateway-istio"]
      to:
      - operation:
          ports: ["8080"]
          hosts: ["argocd-server.argocd.svc.cluster.local", "argocd.jin-server.com"]
    # Rule C: Allow internal communication from argocd-server and controller to argocd-repo-server
    - from:
      - source:
          principals:
            - "cluster.local/ns/argocd/sa/argocd-server"
            - "cluster.local/ns/argocd/sa/argocd-application-controller"
      to:
      - operation:
          ports: ["8081"]
