apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
data:
  admin.enabled: "false"
  agent.principal.enabled: "true"
  url: https://argocd.jin-server.com
  oidc.config: |
    name: Keycloak
    issuer: https://keycloak.jin-server.com/realms/platform
    clientID: argocd
    clientSecret: $oidc.keycloak.clientSecret
    usernameClaim: preferred_username
    requestedScopes: ["openid", "profile", "email", "groups"]
