apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: victoria-metrics-grafana-security
  namespace: victoria-metrics
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
    # 1. Allow Kubelet health check on HTTP port 3000
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow L7 HTTP traffic from Ingress Gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": istio-system
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: victoria-metrics-cluster-security
  namespace: victoria-metrics
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["vmagent", "vminsert", "vmselect", "vmstorage"]
  ingress:
    # 1. Allow Kubelet health check on HTTP ports
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8429"
              protocol: TCP
            - port: "8480"
              protocol: TCP
            - port: "8481"
              protocol: TCP
            - port: "8482"
              protocol: TCP
    # 2. Allow Istio ztunnel HBONE tunneling
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
            - port: "15021"
              protocol: TCP
    # 3. Allow internal traffic between victoria-metrics components
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": victoria-metrics
      toPorts:
        - ports:
            - port: "8429"
              protocol: TCP
            - port: "8480"
              protocol: TCP
            - port: "8481"
              protocol: TCP
            - port: "8482"
              protocol: TCP
            - port: "8400"
              protocol: TCP
            - port: "8401"
              protocol: TCP
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: victoria-metrics-grafana-policy
  namespace: victoria-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes
    - to:
      - operation:
          methods: ["GET"]
          ports: ["3000"]
          paths: ["/api/health"]
    # Rule B: Allow access from Management Ingress Gateway to Grafana
    - from:
      - source:
          principals: ["cluster.local/ns/istio-system/sa/management-gateway-istio"]
      to:
      - operation:
          ports: ["3000"]
          hosts: ["victoria-metrics-grafana.victoria-metrics.svc.cluster.local", "grafana.jin-server.com"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: victoria-metrics-vmagent-policy
  namespace: victoria-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vmagent
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes
    - to:
      - operation:
          methods: ["GET"]
          ports: ["8429"]
          paths: ["/health"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: victoria-metrics-vminsert-policy
  namespace: victoria-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vminsert
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes
    - to:
      - operation:
          methods: ["GET"]
          ports: ["8480"]
          paths: ["/health"]
    # Rule B: Allow write traffic from vmagent
    - from:
      - source:
          principals: ["cluster.local/ns/victoria-metrics/sa/vmagent-victoria-metrics"]
      to:
      - operation:
          ports: ["8480"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: victoria-metrics-vmselect-policy
  namespace: victoria-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vmselect
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes
    - to:
      - operation:
          methods: ["GET"]
          ports: ["8481"]
          paths: ["/health"]
    # Rule B: Allow query traffic from Grafana
    - from:
      - source:
          principals: ["cluster.local/ns/victoria-metrics/sa/victoria-metrics-grafana"]
      to:
      - operation:
          ports: ["8481"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: victoria-metrics-vmstorage-policy
  namespace: victoria-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vmstorage
  action: ALLOW
  rules:
    # Rule A: Allow Kubelet health probes
    - to:
      - operation:
          methods: ["GET"]
          ports: ["8482"]
          paths: ["/health"]
    # Rule B: Allow data traffic from vminsert and vmselect
    - from:
      - source:
          principals: ["cluster.local/ns/victoria-metrics/sa/vmcluster-victoria-metrics"]
      to:
      - operation:
          ports: ["8482", "8400", "8401"]
