{{- if .Values.controller.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dra-driver-nvidia-gpu.name" . }}-controller
  namespace: {{ include "dra-driver-nvidia-gpu.namespace" . }}
  labels:
    {{- include "dra-driver-nvidia-gpu.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dra-driver-nvidia-gpu.selectorLabels" (dict "context" . "componentName" "controller") | nindent 6 }}
  policyTypes:
  - Egress
  egress:
  # Some CNIs are not capable of controlling access to host network resources nor plain IP addresses,
  # as they are identity based and these resources are not being covered this way.
  #
  # Therefore, we cannot filter egress traffic by destination using native network policies and pod selectors.
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
{{- end }}
