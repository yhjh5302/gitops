# SPDX-License-Identifier: Apache-2.0
mode: production

hostname:
  hostname: https://sso.example.com

database:
  external:
    vendor: postgres
    host: postgresql-rw.default.svc
    port: 5432
    name: keycloak
    username: keycloak
    existingSecret: keycloak-db

probes:
  profile: heavy-startup

extensions:
  providers:
    existingSecret: keycloak-providers
    rolloutToken: providers-v3
  themes:
    existingConfigMap: keycloak-themes
    rolloutToken: themes-v4
