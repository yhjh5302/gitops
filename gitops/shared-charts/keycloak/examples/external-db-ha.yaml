# SPDX-License-Identifier: Apache-2.0
mode: production

hostname:
  hostname: https://sso.example.com
  admin: https://admin-sso.example.com

database:
  external:
    vendor: postgres
    host: postgresql-rw.default.svc
    port: 5432
    name: keycloak
    username: keycloak
    existingSecret: keycloak-db

replicaCount: 3

cache:
  enabled: true
  stack: jdbc-ping

ingress:
  public:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    hosts:
      - host: sso.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - sso.example.com
        secretName: keycloak-tls
  admin:
    enabled: true
    ingressClassName: internal-nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-internal
    hosts:
      - host: admin-sso.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - admin-sso.example.com
        secretName: keycloak-admin-tls

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

pdb:
  enabled: true
