# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-keycloak-admin

  - it: should be Opaque type
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain admin credential keys
    asserts:
      - isNotNull:
          path: data["admin-username"]
      - isNotNull:
          path: data["admin-password"]

  - it: should not be created when existingSecret is set
    set:
      admin.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should create db secret with postgresql subchart
    set:
      postgresql.enabled: true
      postgresql.auth.password: devpass
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        isKind:
          of: Secret
      - documentIndex: 1
        equal:
          path: metadata.name
          value: test-keycloak-db

  - it: should create db secret with mysql subchart
    set:
      mysql.enabled: true
      mysql.auth.password: devpass
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        isKind:
          of: Secret
      - documentIndex: 1
        equal:
          path: metadata.name
          value: test-keycloak-db

  - it: should create db secret with external database password
    set:
      mode: production
      hostname.hostname: sso.example.com
      database.external.host: pg-host
      database.external.password: prodpass
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        equal:
          path: metadata.name
          value: test-keycloak-db

  - it: should not create db secret when external existingSecret is set
    set:
      mode: production
      hostname.hostname: sso.example.com
      database.external.host: pg-host
      database.external.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 1

  - it: should not create db secret in dev mode without database
    asserts:
      - hasDocuments:
          count: 1
