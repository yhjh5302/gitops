# SPDX-License-Identifier: Apache-2.0
suite: Ingress
templates:
  - ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create Ingress by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create public Ingress when enabled
    set:
      ingress.public.enabled: true
      ingress.public.hosts:
        - host: sso.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: traefik
