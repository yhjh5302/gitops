# SPDX-License-Identifier: Apache-2.0
suite: PodDisruptionBudget
templates:
  - pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create PDB by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create PDB with single replica even when enabled
    set:
      pdb.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB with multiple replicas when enabled
    set:
      pdb.enabled: true
      replicaCount: 3
    asserts:
      - isKind:
          of: PodDisruptionBudget
