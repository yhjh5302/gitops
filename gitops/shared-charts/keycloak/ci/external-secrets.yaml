# SPDX-License-Identifier: Apache-2.0
mode: production

hostname:
  hostname: https://sso.example.com

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    existingSecret: keycloak-database-credentials
    existingSecretPostgresPasswordKey: db-password
    existingSecretUserPasswordKey: db-password

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  admin:
    enabled: true
    usernameRemoteRef:
      key: test/username
    passwordRemoteRef:
      key: test/password
  database:
    enabled: true
    targetName: keycloak-database-credentials
    passwordRemoteRef:
      key: test/password
