# SPDX-License-Identifier: Apache-2.0
mode: production

http:
  relativePath: /auth

management:
  relativePath: /auth

hostname:
  hostname: https://sso.example.com/auth
  admin: https://admin-sso.example.com/auth

proxy:
  headers: xforwarded

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: testpassword

ingress:
  public:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: sso.example.com
        paths:
          - path: /auth
            pathType: Prefix
  admin:
    enabled: true
    ingressClassName: internal-nginx
    hosts:
      - host: admin-sso.example.com
        paths:
          - path: /auth
            pathType: Prefix
