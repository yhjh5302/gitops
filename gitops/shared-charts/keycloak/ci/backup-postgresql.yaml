# CI: Backup enabled with PostgreSQL subchart
mode: production

hostname:
  hostname: https://sso.example.com

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: ci-test-password

backup:
  enabled: true
  suspend: true
  s3:
    endpoint: https://minio.example.com
    bucket: keycloak-backups
    accessKey: test-access
    secretKey: test-secret
