mode: production

hostname:
  hostname: https://sso.example.com
  admin: https://admin-sso.example.com

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: testpassword

gateway:
  public:
    enabled: true
    parentRefs:
      - name: public-gateway
        namespace: gateway-system
    hostnames:
      - sso.example.com
  admin:
    enabled: true
    parentRefs:
      - name: internal-gateway
        namespace: gateway-system
    hostnames:
      - admin-sso.example.com
