mode: production

hostname:
  hostname: https://sso.example.com

database:
  tls:
    enabled: true
    sslMode: verify-ca
    existingSecret: keycloak-database-tls

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: testpassword
  tls:
    enabled: true
    existingSecret: keycloak-database-tls
    sslMode: verify-ca
    volumePermissions:
      enabled: true

