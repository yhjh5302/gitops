# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create NetworkPolicy by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create NetworkPolicy when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - hasDocuments:
          count: 1

  - it: should allow ingress on mysql port
    set:
      networkPolicy.enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 3306

  - it: should add egress policy types and default egress rules when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: TCP
            port: 3306

  - it: should add HTTPS egress when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
      networkPolicy.egress.allowHTTPS: true
    asserts:
      - contains:
          path: spec.egress[2].ports
          content:
            protocol: TCP
            port: 443

  - it: should nest extra egress peers under a to rule
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
      networkPolicy.egress.extraTo[0].podSelector.matchLabels.app: external-secrets
    asserts:
      - equal:
          path: spec.egress[2].to[0].podSelector.matchLabels.app
          value: external-secrets
