# SPDX-License-Identifier: Apache-2.0
suite: Extra manifests
templates:
  - extra-manifests.yaml
tests:
  - it: should render object manifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: mysql-extra
          type: Opaque
          stringData:
            key: value
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: mysql-extra

  - it: should render templated string manifests
    set:
      extraManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ .Release.Name }}-extra"
          data:
            key: value
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-extra
