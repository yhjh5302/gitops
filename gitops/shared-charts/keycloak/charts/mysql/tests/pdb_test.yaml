# SPDX-License-Identifier: Apache-2.0
suite: PodDisruptionBudget
templates:
  - pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create PDB by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB when enabled
    set:
      pdb.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
