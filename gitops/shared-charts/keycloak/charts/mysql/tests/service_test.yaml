# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Service
    asserts:
      - isKind:
          of: Service

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-mysql

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 3306
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mysql
            port: 3306
            targetPort: mysql

  - it: should have correct selector labels
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: mysql
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: test
