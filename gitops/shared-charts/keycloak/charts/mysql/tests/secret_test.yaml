# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-mysql-auth

  - it: should be Opaque type
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain required password keys
    asserts:
      - isNotNull:
          path: data["mysql-root-password"]
      - isNotNull:
          path: data["mysql-user-password"]
      - isNotNull:
          path: data["mysql-replication-password"]

  - it: should not be created when existingSecret is set
    set:
      auth.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not be created when auth is managed by External Secrets Operator
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: local-store
      externalSecrets.auth.enabled: true
      externalSecrets.auth.rootPasswordRemoteRef.key: mysql/credentials
      externalSecrets.auth.userPasswordRemoteRef.key: mysql/credentials
      externalSecrets.auth.replicationPasswordRemoteRef.key: mysql/credentials
    asserts:
      - hasDocuments:
          count: 0
