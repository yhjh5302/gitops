# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-postgresql-auth

  - it: should be Opaque type
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain required password keys on standalone
    asserts:
      - isNotNull:
          path: data["postgres-password"]
      - isNotNull:
          path: data["user-password"]
      - notExists:
          path: data["replication-password"]

  - it: should contain replication-password key on replication architecture
    set:
      architecture: replication
    asserts:
      - isNotNull:
          path: data["postgres-password"]
      - isNotNull:
          path: data["user-password"]
      - isNotNull:
          path: data["replication-password"]

  - it: should not be created when existingSecret is set
    set:
      auth.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0
