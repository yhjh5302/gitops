# SPDX-License-Identifier: Apache-2.0
suite: Backup
templates:
  - templates/backup-configmap.yaml
  - templates/backup-cronjob.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render backup resources by default
    template: templates/backup-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render backup cronjob by default
    template: templates/backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render backup configmap
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: access
      backup.s3.secretKey: secret
    template: templates/backup-configmap.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["postgresql-backup.sh"]
          pattern: "--database=postgres"

  - it: should render backup cronjob
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: access
      backup.s3.secretKey: secret
    template: templates/backup-cronjob.yaml
    asserts:
      - isKind:
          of: CronJob
      - contains:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].env
          content:
            name: DB_HOST
            value: test-postgresql

  - it: should render backup secret when using inline s3 credentials
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: access
      backup.s3.secretKey: secret
    template: templates/secret.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret

  - it: should not require inline s3 credentials when backup ExternalSecret is enabled
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.backup.enabled: true
      externalSecrets.backup.accessKeyRemoteRef:
        key: postgresql/backup
        property: access-key
      externalSecrets.backup.secretKeyRemoteRef:
        key: postgresql/backup
        property: secret-key
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 1
