# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create NetworkPolicy by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create NetworkPolicy when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - hasDocuments:
          count: 1

  - it: should allow all pods in same namespace by default
    set:
      networkPolicy.enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            podSelector: {}

  - it: should allow ingress on postgres port
    set:
      networkPolicy.enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 5432

  - it: should add egress policy when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 5432
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[2].ports
          content:
            protocol: TCP
            port: 443
