# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecrets
templates:
  - externalsecret.yaml
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render ExternalSecret by default
    template: externalsecret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render auth ExternalSecret and suppress native auth Secret
    template: externalsecret.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.auth.enabled: true
      externalSecrets.auth.postgresPasswordRemoteRef:
        key: postgresql/auth
        property: postgres-password
      externalSecrets.auth.userPasswordRemoteRef:
        key: postgresql/auth
        property: user-password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets
      - equal:
          path: spec.target.name
          value: test-postgresql-auth
      - equal:
          path: spec.data[0].secretKey
          value: postgres-password
      - equal:
          path: spec.data[1].remoteRef.property
          value: user-password

  - it: should suppress native auth Secret when auth ExternalSecret is enabled
    template: secret.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.auth.enabled: true
      externalSecrets.auth.postgresPasswordRemoteRef:
        key: postgresql/auth
        property: postgres-password
      externalSecrets.auth.userPasswordRemoteRef:
        key: postgresql/auth
        property: user-password
    asserts:
      - hasDocuments:
          count: 0

  - it: should include replication password when auth ExternalSecret is used in replication mode
    template: externalsecret.yaml
    set:
      architecture: replication
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.auth.enabled: true
      externalSecrets.auth.postgresPasswordRemoteRef:
        key: postgresql/auth
        property: postgres-password
      externalSecrets.auth.userPasswordRemoteRef:
        key: postgresql/auth
        property: user-password
      externalSecrets.auth.replicationPasswordRemoteRef:
        key: postgresql/auth
        property: replication-password
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.data[2].secretKey
          value: replication-password

  - it: should render TLS ExternalSecret as the TLS source
    template: externalsecret.yaml
    set:
      tls.enabled: true
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.tls.enabled: true
      externalSecrets.tls.certRemoteRef:
        key: postgresql/tls
        property: tls.crt
      externalSecrets.tls.keyRemoteRef:
        key: postgresql/tls
        property: tls.key
      externalSecrets.tls.caRemoteRef:
        key: postgresql/tls
        property: ca.crt
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.target.name
          value: test-postgresql-tls
      - equal:
          path: spec.data[1].secretKey
          value: tls.key

  - it: should render backup ExternalSecret and suppress native backup Secret
    template: externalsecret.yaml
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.backup.enabled: true
      externalSecrets.backup.accessKeyRemoteRef:
        key: postgresql/backup
        property: access-key
      externalSecrets.backup.secretKeyRemoteRef:
        key: postgresql/backup
        property: secret-key
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.target.name
          value: test-postgresql-backup
      - equal:
          path: spec.data[0].secretKey
          value: access-key

  - it: should fail ExternalSecrets without SecretStore reference
    template: secret.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.auth.enabled: true
      externalSecrets.auth.postgresPasswordRemoteRef.key: postgresql/auth
      externalSecrets.auth.userPasswordRemoteRef.key: postgresql/auth
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled is true"

  - it: should fail TLS ExternalSecret when TLS is not enabled
    template: secret.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.tls.enabled: true
      externalSecrets.tls.certRemoteRef.key: postgresql/tls
      externalSecrets.tls.keyRemoteRef.key: postgresql/tls
      externalSecrets.tls.caRemoteRef.key: postgresql/tls
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.tls.enabled requires tls.enabled=true"
