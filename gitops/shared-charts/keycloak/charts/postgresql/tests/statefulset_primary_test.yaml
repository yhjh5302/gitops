# SPDX-License-Identifier: Apache-2.0
suite: StatefulSet Primary
templates:
  - statefulset-primary.yaml
  - configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a StatefulSet
    template: statefulset-primary.yaml
    asserts:
      - isKind:
          of: StatefulSet

  - it: should have correct name in standalone mode
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-postgresql

  - it: should have correct name in replication mode
    template: statefulset-primary.yaml
    set:
      architecture: replication
    asserts:
      - equal:
          path: metadata.name
          value: test-postgresql-primary

  - it: should use the correct image
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/library/postgres:18.4-trixie"

  - it: should have selector labels matching template labels
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: postgresql
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test

  - it: should have component label
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: postgresql

  - it: should have standalone role in standalone mode
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/role"]
          value: standalone

  - it: should have primary role in replication mode
    template: statefulset-primary.yaml
    set:
      architecture: replication
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/role"]
          value: primary

  - it: should always have 1 replica
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should mount data volume
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/lib/postgresql/data

  - it: should mount generated initdb volume by default
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: initdb
            mountPath: /docker-entrypoint-initdb.d
      - contains:
          path: spec.template.spec.volumes[1].projected.sources
          content:
            configMap:
              name: test-postgresql-initdb

  - it: should not mount initdb volume when default init script is disabled without custom scripts
    template: statefulset-primary.yaml
    set:
      initdb.runDefaultScript: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: initdb
            mountPath: /docker-entrypoint-initdb.d
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: initdb

  - it: should mount custom initdb scripts without generated default script
    template: statefulset-primary.yaml
    set:
      initdb.runDefaultScript: false
      initdb.scripts:
        10-custom.sql: |
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: initdb
            mountPath: /docker-entrypoint-initdb.d
      - contains:
          path: spec.template.spec.volumes[1].projected.sources
          content:
            configMap:
              name: test-postgresql-initdb

  - it: should mount only external initdb ConfigMap when default script is disabled
    template: statefulset-primary.yaml
    set:
      initdb.runDefaultScript: false
      initdb.existingConfigMap: external-initdb
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: initdb
            mountPath: /docker-entrypoint-initdb.d
      - equal:
          path: spec.template.spec.volumes[1].projected.sources[0].configMap.name
          value: external-initdb
      - lengthEqual:
          path: spec.template.spec.volumes[1].projected.sources
          count: 1

  - it: should set PGDATA env var
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGDATA
            value: /var/lib/postgresql/data/pgdata

  - it: should let the image create the app database when default init script is enabled
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: app

  - it: should stop the image from creating the app database when default init script is disabled
    template: statefulset-primary.yaml
    set:
      initdb.runDefaultScript: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: postgres
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_DATABASE
            value: app

  - it: should use default port 5432
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: postgres
            containerPort: 5432

  - it: should set security context
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 999
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should set pod security context
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999

  - it: should not automount the service account token by default
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should have liveness probe by default
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.exec.command[2]
          value: PGPASSWORD="${POSTGRES_PASSWORD}" pg_isready -U postgres -h 127.0.0.1 -p 5432 -d postgres

  - it: should have readiness probe by default
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should have startup probe by default
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe
      - matchRegex:
          path: spec.template.spec.containers[0].startupProbe.exec.command[2]
          pattern: 'psql -U postgres -h 127\.0\.0\.1 -p 5432 -d template1 -tAc "SELECT 1"'
      - matchRegex:
          path: spec.template.spec.containers[0].startupProbe.exec.command[2]
          pattern: 'createdb -U postgres -h 127\.0\.0\.1 -p 5432 postgres'

  - it: should use postgres for replication primary readiness check
    template: statefulset-primary.yaml
    set:
      architecture: replication
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: 'createdb -U postgres -h 127\.0\.0\.1 -p 5432 postgres'
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: 'psql -U postgres -h 127\.0\.0\.1 -p 5432 -d postgres -tAc "SELECT CASE WHEN pg_is_in_recovery\(\) THEN 1 ELSE 0 END" \| grep -qx 0'

  - it: should not use postStart for maintenance database repair
    template: statefulset-primary.yaml
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].lifecycle
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: 'createdb -U postgres -h 127\.0\.0\.1 -p 5432 postgres'

  - it: should keep maintenance database repair when startup probe is disabled
    template: statefulset-primary.yaml
    set:
      startupProbe.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].startupProbe
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: 'createdb -U postgres -h 127\.0\.0\.1 -p 5432 postgres'

  - it: should create VolumeClaimTemplate when persistence is enabled
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.volumeClaimTemplates
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 8Gi

  - it: should use emptyDir when persistence is disabled
    template: statefulset-primary.yaml
    set:
      standalone.persistence.enabled: false
    asserts:
      - isNull:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should use custom PVC size
    template: statefulset-primary.yaml
    set:
      standalone.persistence.size: 50Gi
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 50Gi

  - it: should reference existing secret when configured
    template: statefulset-primary.yaml
    set:
      auth.existingSecret: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: postgres-password

  - it: should not have metrics sidecar by default
    template: statefulset-primary.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should add metrics sidecar when enabled
    template: statefulset-primary.yaml
    set:
      metrics.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: postgres-exporter
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: DATA_SOURCE_URI
            value: 127.0.0.1:5432/postgres?sslmode=disable
      - equal:
          path: spec.template.spec.containers[1].args[0]
          value: --config.file=/etc/postgres-exporter/postgres_exporter.yml
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: config
            mountPath: /etc/postgres-exporter
            readOnly: true

  - it: should not mount TLS volume by default
    template: statefulset-primary.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls
            mountPath: /tls
            readOnly: true

  - it: should mount TLS volume when enabled
    template: statefulset-primary.yaml
    set:
      tls.enabled: true
      tls.existingSecret: pg-tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls
            mountPath: /tls
            readOnly: true

  - it: should normalize TLS secret permissions when enabled
    template: statefulset-primary.yaml
    set:
      tls.enabled: true
      tls.existingSecret: pg-tls
      tls.volumePermissions.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: tls-volume-permissions
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: 'chmod 0600 "/tls-fixed/tls\.key"'
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-fixed
            mountPath: /tls
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-fixed
            emptyDir: {}

  - it: should normalize TLS secret ownership for configured PostgreSQL UID and GID
    template: statefulset-primary.yaml
    set:
      tls.enabled: true
      tls.existingSecret: pg-tls
      tls.volumePermissions.enabled: true
      securityContext.runAsUser: 1001
      securityContext.runAsGroup: 1002
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: 'chown 1001:1002 "/tls-fixed/tls\.crt" "/tls-fixed/tls\.key" "/tls-fixed/ca\.crt"'
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: 'chmod 0600 "/tls-fixed/tls\.key"'

  - it: should apply resource preset small
    template: statefulset-primary.yaml
    set:
      standalone.resourcesPreset: small
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
