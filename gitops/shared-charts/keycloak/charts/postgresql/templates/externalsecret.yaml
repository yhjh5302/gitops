{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- include "postgresql.validateExternalSecrets" . -}}
{{- $externalSecrets := .Values.externalSecrets | default dict -}}
{{- $secretStoreRef := get $externalSecrets "secretStoreRef" | default dict -}}
{{- $target := get $externalSecrets "target" | default dict -}}
{{- $auth := get $externalSecrets "auth" | default dict -}}
{{- $tls := get $externalSecrets "tls" | default dict -}}
{{- $backup := get $externalSecrets "backup" | default dict -}}
{{- if get $externalSecrets "enabled" }}
{{- if get $auth "enabled" }}
apiVersion: {{ get $externalSecrets "apiVersion" | default "external-secrets.io/v1" }}
kind: ExternalSecret
metadata:
  name: {{ include "postgresql.fullname" . }}-auth
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ get $externalSecrets "refreshInterval" | default "1h" | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled is true" (get $secretStoreRef "name") | quote }}
    kind: {{ get $secretStoreRef "kind" | default "SecretStore" | quote }}
  target:
    name: {{ include "postgresql.secretName" . | quote }}
    creationPolicy: {{ get $target "creationPolicy" | default "Owner" | quote }}
  data:
    - secretKey: {{ .Values.auth.existingSecretPostgresPasswordKey | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.auth.postgresPasswordRemoteRef | nindent 8 }}
    - secretKey: {{ .Values.auth.existingSecretUserPasswordKey | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.auth.userPasswordRemoteRef | nindent 8 }}
    {{- if eq .Values.architecture "replication" }}
    - secretKey: {{ .Values.auth.existingSecretReplicationPasswordKey | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.auth.replicationPasswordRemoteRef | nindent 8 }}
    {{- end }}
{{- end }}
{{- if get $tls "enabled" }}
---
apiVersion: {{ get $externalSecrets "apiVersion" | default "external-secrets.io/v1" }}
kind: ExternalSecret
metadata:
  name: {{ include "postgresql.fullname" . }}-tls
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ get $externalSecrets "refreshInterval" | default "1h" | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled is true" (get $secretStoreRef "name") | quote }}
    kind: {{ get $secretStoreRef "kind" | default "SecretStore" | quote }}
  target:
    name: {{ include "postgresql.tlsSecretName" . | quote }}
    creationPolicy: {{ get $target "creationPolicy" | default "Owner" | quote }}
  data:
    - secretKey: {{ .Values.tls.certFilename | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.tls.certRemoteRef | nindent 8 }}
    - secretKey: {{ .Values.tls.keyFilename | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.tls.keyRemoteRef | nindent 8 }}
    - secretKey: {{ .Values.tls.caFilename | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.tls.caRemoteRef | nindent 8 }}
{{- end }}
{{- if get $backup "enabled" }}
---
apiVersion: {{ get $externalSecrets "apiVersion" | default "external-secrets.io/v1" }}
kind: ExternalSecret
metadata:
  name: {{ include "postgresql.fullname" . }}-backup
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ get $externalSecrets "refreshInterval" | default "1h" | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled is true" (get $secretStoreRef "name") | quote }}
    kind: {{ get $secretStoreRef "kind" | default "SecretStore" | quote }}
  target:
    name: {{ include "postgresql.backupSecretName" . | quote }}
    creationPolicy: {{ get $target "creationPolicy" | default "Owner" | quote }}
  data:
    - secretKey: {{ .Values.backup.s3.existingSecretAccessKeyKey | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.backup.accessKeyRemoteRef | nindent 8 }}
    - secretKey: {{ .Values.backup.s3.existingSecretSecretKeyKey | quote }}
      remoteRef:
        {{- toYaml .Values.externalSecrets.backup.secretKeyRemoteRef | nindent 8 }}
{{- end }}
{{- end }}
