{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql.primaryHeadlessServiceName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: postgres
  selector:
    {{- include "postgresql.componentLabels" (dict "root" . "role" (ternary "primary" "standalone" (eq .Values.architecture "replication"))) | nindent 4 }}
{{- if eq .Values.architecture "replication" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql.replicasHeadlessServiceName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: postgres
  selector:
    {{- include "postgresql.componentLabels" (dict "root" . "role" "replica") | nindent 4 }}
{{- end }}
