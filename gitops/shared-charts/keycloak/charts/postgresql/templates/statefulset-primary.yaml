{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgresql.primaryStatefulSetName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "postgresql.primaryHeadlessServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "postgresql.componentLabels" (dict "root" . "role" (ternary "primary" "standalone" (eq .Values.architecture "replication"))) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgresql.componentLabels" (dict "root" . "role" (ternary "primary" "standalone" (eq .Values.architecture "replication"))) | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "postgresql.podSpecCommon" . | nindent 6 }}
      {{- if and .Values.tls.enabled .Values.tls.volumePermissions.enabled }}
      initContainers:
        {{- include "postgresql.tlsVolumePermissionsInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -c
            - config_file=/etc/postgresql/generated/postgresql.conf
            - -c
            - hba_file=/etc/postgresql/generated/pg_hba.conf
          ports:
            - name: postgres
              containerPort: {{ .Values.service.port }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: {{ include "postgresql.postgresDbEnv" . | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ .Values.auth.existingSecretPostgresPasswordKey }}
            - name: APP_DATABASE
              value: {{ .Values.auth.database | quote }}
            - name: APP_USERNAME
              value: {{ .Values.auth.username | quote }}
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ .Values.auth.existingSecretUserPasswordKey }}
            {{- if eq .Values.architecture "replication" }}
            - name: REPLICATION_USERNAME
              value: {{ .Values.auth.replicationUsername | quote }}
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ .Values.auth.existingSecretReplicationPasswordKey }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: PGSSLMODE
              value: {{ .Values.tls.sslMode | quote }}
            - name: PGSSLROOTCERT
              value: /tls/{{ .Values.tls.caFilename }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "postgresql.probeCommandString" . | quote }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "postgresql.primaryReadinessCommandString" . | quote }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "postgresql.primaryStartupProbeCommandString" . | quote }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- if eq .Values.architecture "replication" }}
            {{- if .Values.replication.primary.resources }}
            {{- toYaml .Values.replication.primary.resources | nindent 12 }}
            {{- else }}
            {{- include "postgresql.resourcesPreset" (dict "preset" .Values.replication.primary.resourcesPreset) | nindent 12 }}
            {{- end }}
            {{- else }}
            {{- if .Values.standalone.resources }}
            {{- toYaml .Values.standalone.resources | nindent 12 }}
            {{- else }}
            {{- include "postgresql.resourcesPreset" (dict "preset" .Values.standalone.resourcesPreset) | nindent 12 }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/generated
            {{- if include "postgresql.initdbVolumeEnabled" . }}
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: {{ include "postgresql.tlsVolumeMountName" . }}
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: postgres-exporter
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          args:
            - --config.file=/etc/postgres-exporter/postgres_exporter.yml
          ports:
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
          env:
            {{- include "postgresql.metricsEnv" . | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- if .Values.metrics.resources }}
            {{- toYaml .Values.metrics.resources | nindent 12 }}
            {{- else }}
            {{- include "postgresql.metricsResourcesPreset" . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/postgres-exporter
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: {{ include "postgresql.tlsVolumeMountName" . }}
              mountPath: /tls
              readOnly: true
            {{- end }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "postgresql.configMapName" . }}
        {{- if include "postgresql.initdbVolumeEnabled" . }}
        - name: initdb
          projected:
            defaultMode: 0755
            sources:
              {{- if include "postgresql.generatedInitdbEnabled" . }}
              - configMap:
                  name: {{ include "postgresql.initdbConfigMapName" . }}
              {{- end }}
              {{- if .Values.initdb.existingConfigMap }}
              - configMap:
                  name: {{ .Values.initdb.existingConfigMap }}
              {{- end }}
        {{- end }}
        {{- include "postgresql.tlsVolume" . | nindent 8 }}
        {{- if not (ternary .Values.replication.primary.persistence.enabled .Values.standalone.persistence.enabled (eq .Values.architecture "replication")) }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if ternary .Values.replication.primary.persistence.enabled .Values.standalone.persistence.enabled (eq .Values.architecture "replication") }}
  volumeClaimTemplates:
    {{- include "postgresql.volumeClaimTemplate" (dict "root" . "persistence" (ternary .Values.replication.primary.persistence .Values.standalone.persistence (eq .Values.architecture "replication"))) | nindent 4 }}
  {{- end }}
