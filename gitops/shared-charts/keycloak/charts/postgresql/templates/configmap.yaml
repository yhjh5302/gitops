apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgresql.configMapName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
data:
  postgres_exporter.yml: |
    {}
  postgresql.conf: |
    listen_addresses = '*'
    port = {{ .Values.service.port }}
    wal_level = replica
    hot_standby = on
    max_wal_senders = {{ .Values.replication.wal.maxSenders }}
    max_replication_slots = {{ .Values.replication.wal.maxReplicationSlots }}
    wal_keep_size = '{{ .Values.replication.wal.keepSize }}'
    {{- with .Values.replication.wal.maxSlotWalKeepSize }}
    max_slot_wal_keep_size = '{{ . }}'
    {{- end }}
    {{- with .Values.replication.wal.idleReplicationSlotTimeout }}
    idle_replication_slot_timeout = '{{ . }}'
    {{- end }}
    {{- with .Values.replication.wal.walSenderTimeout }}
    wal_sender_timeout = '{{ . }}'
    {{- end }}
    password_encryption = scram-sha-256
    {{- if ne .Values.config.preset "none" }}
    {{ include "postgresql.configPreset" . | nindent 4 }}
    {{- else }}
    max_connections = 200
    shared_buffers = '256MB'
    {{- end }}
    {{- if .Values.tls.enabled }}
    ssl = on
    ssl_cert_file = '/tls/{{ .Values.tls.certFilename }}'
    ssl_key_file = '/tls/{{ .Values.tls.keyFilename }}'
    ssl_ca_file = '/tls/{{ .Values.tls.caFilename }}'
    ssl_min_protocol_version = '{{ .Values.tls.minProtocolVersion }}'
    {{- else }}
    ssl = off
    {{- end }}
    {{- with .Values.config.postgresql }}
    {{ . | nindent 4 }}
    {{- end }}
  pg_hba.conf: |
    local   all             all                                     {{ .Values.config.localAuthMethod }}
    {{- if .Values.tls.enabled }}
    hostssl all             all             127.0.0.1/32            scram-sha-256
    hostssl all             all             ::1/128                 scram-sha-256
    {{- else }}
    host    all             all             127.0.0.1/32            scram-sha-256
    host    all             all             ::1/128                 scram-sha-256
    {{- end }}
    {{- include "postgresql.pgHbaClientCIDRRules" . | nindent 4 }}
    {{- if eq .Values.architecture "replication" }}
    {{- include "postgresql.pgHbaReplicationCIDRRules" . | nindent 4 }}
    {{- end }}
    {{- if .Values.config.pgHbaEntries }}
    {{ include "postgresql.pgHbaEntries" . | nindent 4 }}
    {{- end }}
    {{- with .Values.config.pgHba }}
    {{ . | nindent 4 }}
{{- end }}
{{- if include "postgresql.generatedInitdbEnabled" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgresql.initdbConfigMapName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
data:
  {{- if .Values.initdb.runDefaultScript }}
  01-init-users.sh: |
    #!/bin/bash
    set -euo pipefail
    export PGPASSWORD="${POSTGRES_PASSWORD}"
    psql --username "${POSTGRES_USER}" --dbname postgres \
      --set=app_username="${APP_USERNAME}" \
      --set=app_password="${APP_PASSWORD}" \
      --set=app_database="${APP_DATABASE}" \
      --set=replication_username="${REPLICATION_USERNAME:-}" \
      --set=replication_password="${REPLICATION_PASSWORD:-}" <<'SQL'
    SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', :'app_username', :'app_password')
    WHERE :'app_username' <> ''
      AND :'app_password' <> ''
      AND NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'app_username') \gexec

    SELECT format('CREATE DATABASE %I OWNER %I', :'app_database', :'app_username')
    WHERE :'app_database' <> ''
      AND :'app_username' <> ''
      AND NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'app_database') \gexec

    SELECT format('CREATE ROLE %I REPLICATION LOGIN PASSWORD %L', :'replication_username', :'replication_password')
    WHERE :'replication_username' <> ''
      AND :'replication_password' <> ''
      AND NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'replication_username') \gexec
    SQL

    # PostgreSQL 15+ revokes CREATE on the public schema for non-superusers.
    # Grant schema privileges so the application user can run migrations.
    if [ -n "${APP_DATABASE}" ] && [ -n "${APP_USERNAME}" ]; then
      psql --username "${POSTGRES_USER}" --dbname "${APP_DATABASE}" \
        -c "GRANT ALL ON SCHEMA public TO \"${APP_USERNAME}\";"
    fi
  {{- end }}
{{- range $name, $content := .Values.initdb.scripts }}
  {{ $name }}: |
{{ $content | nindent 4 }}
{{- end }}
{{- end }}
