# SPDX-License-Identifier: Apache-2.0
# Example for clusters that already run External Secrets Operator.
# This chart renders ExternalSecret resources only; it does not install
# External Secrets Operator or create SecretStore/ClusterSecretStore objects.
auth:
  database: app
  username: app

tls:
  enabled: true
  volumePermissions:
    enabled: true

backup:
  enabled: true
  s3:
    endpoint: https://minio.example.com
    bucket: postgresql-backups

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  auth:
    enabled: true
    postgresPasswordRemoteRef:
      key: postgresql/auth
      property: postgres-password
    userPasswordRemoteRef:
      key: postgresql/auth
      property: user-password
    replicationPasswordRemoteRef:
      key: postgresql/auth
      property: replication-password
  tls:
    enabled: true
    certRemoteRef:
      key: postgresql/tls
      property: tls.crt
    keyRemoteRef:
      key: postgresql/tls
      property: tls.key
    caRemoteRef:
      key: postgresql/tls
      property: ca.crt
  backup:
    enabled: true
    accessKeyRemoteRef:
      key: postgresql/backup
      property: access-key
    secretKeyRemoteRef:
      key: postgresql/backup
      property: secret-key
