{{- if and .Values.oidcAuth.enabled .Values.oauth2Proxy.enabled }}
  {{- fail "oidcAuth and oauth2Proxy are mutually exclusive" }}
{{- end }}
{{- if and .Values.oidcAuth.enabled .Values.auth.enabled }}
  {{- fail "oidcAuth and auth are mutually exclusive" }}
{{- end }}
{{- if and .Values.oidcAuth.enabled .Values.ldapAuth.enabled }}
  {{- fail "oidcAuth and ldapAuth are mutually exclusive" }}
{{- end }}
{{- if and .Values.auth.enabled .Values.ldapAuth.enabled }}
  {{- fail "auth and ldapAuth are mutually exclusive" }}
{{- end }}
{{- $artifactCommandPrefix := "default-artifact-root" }}
{{- $artifactCommand := printf "--%s=%s" $artifactCommandPrefix .Values.artifactRoot.defaultArtifactRoot }}

{{- if .Values.artifactRoot.proxiedArtifactStorage }}
  {{- $artifactCommandPrefix = "artifacts-destination" }}
  {{- $artifactCommand = printf "--%s=%s" $artifactCommandPrefix .Values.artifactRoot.defaultArtifactsDestination }}
{{- end }}

{{- if .Values.artifactRoot.azureBlob.enabled }}
  {{- $artifactCommand = printf "--%s=wasbs://%s@%s.blob.core.windows.net/%s" $artifactCommandPrefix .Values.artifactRoot.azureBlob.container .Values.artifactRoot.azureBlob.storageAccount .Values.artifactRoot.azureBlob.path }}
{{- else if .Values.artifactRoot.s3.enabled }}
{{- if .Values.minio.enabled }}
  {{- $artifactCommand = printf "--%s=s3://%s/" $artifactCommandPrefix (ternary (index .Values.minio.buckets 0).name .Values.artifactRoot.s3.bucket (eq .Values.artifactRoot.s3.bucket "")) }}
{{- else }}
  {{- $artifactCommand = printf "--%s=s3://%s/%s" $artifactCommandPrefix .Values.artifactRoot.s3.bucket .Values.artifactRoot.s3.path }}
{{- end }}
{{- else if .Values.artifactRoot.gcs.enabled }}
  {{- $artifactCommand = printf "--%s=gs://%s/%s" $artifactCommandPrefix .Values.artifactRoot.gcs.bucket .Values.artifactRoot.gcs.path }}
{{- end }}

{{- $dbConnectionDriver := "" }}
{{- if and (or .Values.backendStore.postgres.enabled .Values.postgresql.enabled) .Values.backendStore.postgres.driver }}
  {{- $dbConnectionDriver = printf "+%s" .Values.backendStore.postgres.driver }}
{{- else if and (or .Values.backendStore.mysql.enabled .Values.mysql.enabled) .Values.backendStore.mysql.driver }}
  {{- $dbConnectionDriver = printf "+%s" .Values.backendStore.mysql.driver }}
{{- else if and .Values.backendStore.mssql.enabled .Values.backendStore.mssql.driver }}
  {{- $dbConnectionDriver = printf "+%s" .Values.backendStore.mssql.driver }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mlflow.fullname" . }}
  labels:
    {{- include "mlflow.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not (kindIs "invalid" .Values.revisionHistoryLimit) }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- end }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: {{ .Values.strategy.type }}
    {{- if eq .Values.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "mlflow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mlflow.selectorLabels" . | nindent 8 }}
      {{- with .Values.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mlflow.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if or (and (or .Values.backendStore.postgres.enabled .Values.backendStore.mysql.enabled .Values.backendStore.mssql.enabled .Values.postgresql.enabled .Values.mysql.enabled) (or .Values.backendStore.databaseConnectionCheck .Values.backendStore.databaseMigration) ) .Values.auth.enabled .Values.ldapAuth.enabled .Values.initContainers }}
      initContainers:
    {{- end }}
      {{- if and (or .Values.backendStore.postgres.enabled .Values.backendStore.mysql.enabled .Values.backendStore.mssql.enabled .Values.postgresql.enabled .Values.mysql.enabled) .Values.backendStore.databaseConnectionCheck }}
        - name: dbchecker
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.initImages.dbchecker.repository }}:{{ .Values.initImages.dbchecker.tag }}"
          imagePullPolicy: {{ .Values.initImages.dbchecker.pullPolicy }}
          command: [ "/script/dbchecker.sh" ]
        {{- if or .Values.postgresql.enabled .Values.mysql.enabled .Values.backendStore.existingDatabaseSecret.name }}
          env:
        {{- end }}
          {{- if .Values.postgresql.enabled }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ (include "mlflow.postgresql.fullname" .) }}
              {{- if .Values.postgresql.auth.username }}
                  key: password
              {{- else }}
                  key: postgres-password
              {{- end }}
                  optional: true
          {{- end }}
          {{- if .Values.mysql.enabled }}
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ (include "mlflow.mysql.fullname" .) }}
              {{- if .Values.mysql.auth.username }}
                  key: password
              {{- else }}
                  key: mysql-root-password
              {{- end }}
                  optional: true
          {{- end }}
          {{- if .Values.backendStore.existingDatabaseSecret.name }}
            {{- if .Values.backendStore.postgres.enabled }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
            {{- if .Values.backendStore.mysql.enabled }}
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
            {{- if .Values.backendStore.mssql.enabled }}
            - name: MSSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: MSSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "mlflow.fullname" . }}-env-configmap
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: dbchecker
              mountPath: /script/dbchecker.sh
              subPath: dbchecker.sh
      {{- end }}
      {{- if and (or .Values.backendStore.postgres.enabled .Values.backendStore.mysql.enabled .Values.backendStore.mssql.enabled .Values.postgresql.enabled .Values.mysql.enabled) .Values.backendStore.databaseMigration }}
        - name: "mlflow-db-migration"
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.initImages.mlflowDbMigration.repository }}:{{ .Values.initImages.mlflowDbMigration.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.initImages.mlflowDbMigration.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if or .Values.postgresql.enabled .Values.mysql.enabled .Values.backendStore.existingDatabaseSecret.name (and .Values.backendStore.mssql.enabled .Values.backendStore.mssql.existingConnectionUrlSecret.name) }}
          env:
        {{- end }}
          {{- if .Values.postgresql.enabled }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ (include "mlflow.postgresql.fullname" .) }}
              {{- if .Values.postgresql.auth.username }}
                  key: password
              {{- else }}
                  key: postgres-password
              {{- end }}
                  optional: true
          {{- end }}
          {{- if .Values.mysql.enabled }}
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ (include "mlflow.mysql.fullname" .) }}
              {{- if .Values.mysql.auth.username }}
                  key: password
              {{- else }}
                  key: mysql-root-password
              {{- end }}
                  optional: true
          {{- end }}
          {{- if .Values.backendStore.existingDatabaseSecret.name }}
            {{- if .Values.backendStore.postgres.enabled }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
            {{- if .Values.backendStore.mysql.enabled }}
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
            {{- if .Values.backendStore.mssql.enabled }}
            - name: MSSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: MSSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
          {{- end }}
          {{- if and .Values.backendStore.mssql.enabled .Values.backendStore.mssql.existingConnectionUrlSecret.name }}
            - name: MSSQL_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.mssql.existingConnectionUrlSecret.name }}
                  key: {{ .Values.backendStore.mssql.existingConnectionUrlSecret.key }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "mlflow.fullname" . }}-env-configmap
            - secretRef:
                name: {{ include "mlflow.fullname" . }}-env-secret
            - secretRef:
                name: {{ include "mlflow.fullname" . }}-flask-server-secret-key
          command: ["python"]
          args:
            - /opt/mlflow/migrations.py
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: migrations-config
              mountPath: /opt/mlflow/migrations.py
              subPath: migrations.py
              readOnly: true
      {{- end }}
      {{- if or .Values.auth.enabled .Values.ldapAuth.enabled }}
        - name: ini-file-initializer
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.initImages.iniFileInitializer.repository }}:{{ .Values.initImages.iniFileInitializer.tag }}"
          imagePullPolicy: {{ .Values.initImages.iniFileInitializer.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              {{- if .Values.auth.enabled }}
              sed -e "s/\$(ADMIN_USERNAME_PLACEHOLDER)/${ADMIN_USERNAME}/g" \
                  -e "s/\$(ADMIN_PASSWORD_PLACEHOLDER)/${ADMIN_PASSWORD}/g" \
                {{- if or .Values.auth.postgres.enabled .Values.postgresql.enabled }}
                  -e "s/\$(POSTGRES_USERNAME_PLACEHOLDER)/${DB_USERNAME}/g" \
                  -e "s/\$(POSTGRES_PASSWORD_PLACEHOLDER)/${DB_PASSWORD}/g" \
                {{- end }}
                  /template/auth_template.ini > /config/auth_result.ini
              {{- else }}
              cp /template/auth_template.ini /config/auth_result.ini
              {{- end }}
          {{- if .Values.auth.enabled }}
          env:
          {{- if .Values.auth.postgres.enabled }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth-pg-secret" (include "mlflow.fullname" .)) .Values.auth.postgres.existingSecret.name }}
                  key: {{ ternary "username" .Values.auth.postgres.existingSecret.usernameKey (eq .Values.auth.postgres.existingSecret.name "") }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth-pg-secret" (include "mlflow.fullname" .)) .Values.auth.postgres.existingSecret.name }}
                  key: {{ ternary "password" .Values.auth.postgres.existingSecret.passwordKey (eq .Values.auth.postgres.existingSecret.name "") }}
          {{- else if .Values.postgresql.enabled }}
            - name: DB_USERNAME
              value: {{ default "postgres" .Values.postgresql.auth.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.postgresql.fullname" . }}
                  key: {{ ternary "postgres-password" "password" (eq .Values.postgresql.auth.username "") }}
          {{- end }}
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth-admin-secret" (include "mlflow.fullname" .)) .Values.auth.existingAdminSecret.name }}
                  key: {{ ternary "username" .Values.auth.existingAdminSecret.usernameKey (eq .Values.auth.existingAdminSecret.name "") }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth-admin-secret" (include "mlflow.fullname" .)) .Values.auth.existingAdminSecret.name }}
                  key: {{ ternary "password" .Values.auth.existingAdminSecret.passwordKey (eq .Values.auth.existingAdminSecret.name "") }}
          {{- end }}
          volumeMounts:
            - name: auth-ini-template-file
              mountPath: /template
              readOnly: true
            - name: ini-file
              mountPath: /config
      {{- end }}
      {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "mlflow.containerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["mlflow"]
          args:
            - server
            - --host={{ .Values.serverHost }}
            - --port={{ .Values.service.containerPort }}
          {{- if or .Values.backendStore.postgres.enabled .Values.postgresql.enabled }}
            - --backend-store-uri=postgresql{{ $dbConnectionDriver }}://
          {{- else if or .Values.backendStore.mysql.enabled .Values.mysql.enabled }}
            - --backend-store-uri=mysql{{ $dbConnectionDriver }}://$(MYSQL_USERNAME):$(MYSQL_PWD)@$(MYSQL_HOST):$(MYSQL_TCP_PORT)/$(MYSQL_DATABASE)
          {{- else if or .Values.backendStore.mssql.enabled }}
            {{- if .Values.backendStore.mssql.existingConnectionUrlSecret.name }}
            - --backend-store-uri=$(MSSQL_CONNECTION_URL)
            {{- else if .Values.backendStore.mssql.connectionUrl }}
            - --backend-store-uri={{ .Values.backendStore.mssql.connectionUrl }}
            {{- else }}
            - --backend-store-uri=mssql{{ $dbConnectionDriver }}://$(MSSQL_USERNAME):$(MSSQL_PWD)@$(MSSQL_HOST):$(MSSQL_TCP_PORT)/$(MSSQL_DATABASE)
            {{- end }}
          {{- else }}
            - "--backend-store-uri=sqlite:///{{ .Values.backendStore.defaultSqlitePath }}"
          {{- end }}
            - {{ $artifactCommand }}
          {{- if .Values.artifactRoot.proxiedArtifactStorage }}
            - --serve-artifacts
          {{- end }}
          {{- if .Values.serviceMonitor.enabled }}
            - --expose-prometheus=/mlflow/metrics
          {{- end }}
          {{- if .Values.oidcAuth.enabled }}
            - --app-name=oidc-auth
          {{- else if .Values.auth.enabled }}
            - --app-name={{ .Values.auth.appName }}
          {{- else if .Values.ldapAuth.enabled }}
            - --app-name=basic-auth
          {{- end }}
          {{- if and .Values.log.enabled (not (hasKey .Values.extraArgs "gunicornOpts")) (not (hasKey .Values.extraArgs "uvicornOpts")) }}
            - {{ printf "--uvicorn-opts='--log-level=%s'" .Values.log.level }}
          {{- end }}
          {{- range $key, $value := .Values.extraArgs }}
            {{- if and $.Values.log.enabled (eq $key "uvicornOpts") (contains "--log-level" $value) }}
            - {{ printf "--uvicorn-opts='%s'" (regexReplaceAll "--log-level=[^\\s]*" $value (printf "--log-level=%s" $.Values.log.level)) }}
            {{- else if and $.Values.log.enabled (eq $key "uvicornOpts") (not (contains "--log-level" $value)) }}
            - {{ printf "--uvicorn-opts='--log-level=%s %s'" $.Values.log.level $value }}
            {{- else if and $.Values.log.enabled (eq $key "gunicornOpts") (contains "--log-level" $value) }}
            - {{ printf "--gunicorn-opts='%s'" (regexReplaceAll "--log-level=[^\\s]*" $value (printf "--log-level=%s" $.Values.log.level)) }}
            {{- else if and $.Values.log.enabled (eq $key "gunicornOpts") (not (contains "--log-level" $value)) }}
            - {{ printf "--gunicorn-opts='--log-level=%s %s'" $.Values.log.level $value }}
            {{- else }}
            - {{ printf "--%s=%s" (kebabcase $key) $value }}
            {{- end }}
          {{- end }}
          {{- range .Values.extraFlags }}
            - --{{ kebabcase . }}
          {{- end }}
          ports:
            - name: {{ .Values.service.containerPortName }}
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.containerPortName }}
          {{- with .Values.livenessProbe }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.containerPortName }}
          {{- with .Values.readinessProbe }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: MLFLOW_VERSION
              value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
          {{- if .Values.auth.enabled }}
            - name: MLFLOW_AUTH_CONFIG_PATH
              value: {{ printf "%s/%s" (.Values.auth.configPath | trimSuffix "/") (default "basic_auth.ini" (.Values.auth.configFile | trimPrefix "/")) }}
          {{- else if .Values.ldapAuth.enabled }}
            - name: MLFLOW_AUTH_CONFIG_PATH
              value: "/etc/mlflow/auth/ldap_basic_auth.ini"
            {{- if or .Values.ldapAuth.encodedTrustedCACertificate .Values.ldapAuth.externalSecretForTrustedCACertificate }}
            - name: LDAP_CA
              value: "/certs/ca.crt"
            {{- end }}
          {{- else if .Values.oidcAuth.enabled }}
            - name: OIDC_DISCOVERY_URL
              value: {{ .Values.oidcAuth.discoveryUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidcAuth.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.oidcAuthSecretName" . }}
                  key: {{ .Values.oidcAuth.existingSecret.clientSecretKey }}
            {{- if .Values.oidcAuth.redirectUri }}
            - name: OIDC_REDIRECT_URI
              value: {{ .Values.oidcAuth.redirectUri | quote }}
            {{- end }}
            - name: OIDC_SCOPE
              value: {{ .Values.oidcAuth.scope | quote }}
            {{- if .Values.oidcAuth.audience }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.oidcAuth.audience | quote }}
            {{- end }}
            - name: OIDC_PROVIDER_DISPLAY_NAME
              value: {{ .Values.oidcAuth.providerDisplayName | quote }}
            - name: OIDC_GROUPS_ATTRIBUTE
              value: {{ .Values.oidcAuth.groupsAttribute | quote }}
            - name: OIDC_GROUP_NAME
              value: {{ .Values.oidcAuth.groupName | join "," | quote }}
            - name: OIDC_ADMIN_GROUP_NAME
              value: {{ .Values.oidcAuth.adminGroupName | join "," | quote }}
            - name: DEFAULT_MLFLOW_PERMISSION
              value: {{ .Values.oidcAuth.defaultPermission | quote }}
            - name: SESSION_COOKIE_SECURE
              value: {{ .Values.oidcAuth.sessionCookieSecure | quote }}
            - name: SESSION_COOKIE_SAMESITE
              value: {{ .Values.oidcAuth.sessionCookieSamesite | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.fullname" . }}-flask-server-secret-key
                  key: MLFLOW_FLASK_SERVER_SECRET_KEY
            {{- if .Values.oidcAuth.cache.enabled }}
            - name: CACHE_BACKEND
              value: "redis"
            - name: CACHE_REDIS_URL
              value: {{ .Values.oidcAuth.cache.redisUrl | quote }}
            - name: CACHE_KEY_PREFIX
              value: {{ .Values.oidcAuth.cache.keyPrefix | quote }}
            {{- end }}
            {{- if .Values.oidcAuth.database.postgres.enabled }}
            - name: OIDC_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.oidcAuthDbSecretName" . }}
                  key: {{ .Values.oidcAuth.database.postgres.existingSecret.usernameKey }}
            - name: OIDC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.oidcAuthDbSecretName" . }}
                  key: {{ .Values.oidcAuth.database.postgres.existingSecret.passwordKey }}
            {{- $oidcDbDriver := "" }}
            {{- if .Values.oidcAuth.database.postgres.driver }}
              {{- $oidcDbDriver = printf "+%s" .Values.oidcAuth.database.postgres.driver }}
            {{- end }}
            - name: OIDC_USERS_DB_URI
              value: {{ printf "postgresql%s://$(OIDC_DB_USER):$(OIDC_DB_PASSWORD)@%s:%v/%s" $oidcDbDriver (required "oidcAuth.database.postgres.host must be specified" .Values.oidcAuth.database.postgres.host) .Values.oidcAuth.database.postgres.port (required "oidcAuth.database.postgres.database must be specified" .Values.oidcAuth.database.postgres.database) | quote }}
            {{- else if .Values.oidcAuth.database.uri }}
            - name: OIDC_USERS_DB_URI
              value: {{ .Values.oidcAuth.database.uri | quote }}
            {{- end }}
            {{- if .Values.oidcAuth.trustedProxies }}
            - name: TRUSTED_PROXIES
              value: {{ .Values.oidcAuth.trustedProxies | join "," | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.postgresql.enabled }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ (include "mlflow.postgresql.fullname" .) }}
              {{- if .Values.postgresql.auth.username }}
                  key: password
              {{- else }}
                  key: postgres-password
              {{- end }}
                  optional: true
          {{- end }}
          {{- if .Values.mysql.enabled }}
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ (include "mlflow.mysql.fullname" .) }}
              {{- if .Values.mysql.auth.username }}
                  key: password
              {{- else }}
                  key: mysql-root-password
              {{- end }}
                  optional: true
          {{- end }}
          {{- if .Values.backendStore.existingDatabaseSecret.name }}
            {{- if .Values.backendStore.postgres.enabled }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
            {{- if .Values.backendStore.mysql.enabled }}
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
            {{- if .Values.backendStore.mssql.enabled }}
            - name: MSSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.passwordKey }}
            - name: MSSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.existingDatabaseSecret.name }}
                  key: {{ .Values.backendStore.existingDatabaseSecret.usernameKey }}
            {{- end }}
          {{- end }}
          {{- if and .Values.backendStore.mssql.enabled .Values.backendStore.mssql.existingConnectionUrlSecret.name }}
            - name: MSSQL_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backendStore.mssql.existingConnectionUrlSecret.name }}
                  key: {{ .Values.backendStore.mssql.existingConnectionUrlSecret.key }}
          {{- end }}
          {{- if and .Values.artifactRoot.s3.enabled .Values.artifactRoot.s3.existingSecret.name }}
            {{- if .Values.artifactRoot.s3.existingSecret.keyOfAccessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifactRoot.s3.existingSecret.name }}
                  key: {{ .Values.artifactRoot.s3.existingSecret.keyOfAccessKeyId }}
            {{- end }}
            {{- if .Values.artifactRoot.s3.existingSecret.keyOfSecretAccessKey }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifactRoot.s3.existingSecret.name }}
                  key: {{ .Values.artifactRoot.s3.existingSecret.keyOfSecretAccessKey }}
            {{- end }}
          {{- else if and .Values.artifactRoot.s3.enabled .Values.minio.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-minio" (include "mlflow.fullname" .) }}
                  key: rootUser
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-minio" (include "mlflow.fullname" .) }}
                  key: rootPassword
          {{- end }}
          {{- if .Values.minio.enabled }}
            - name: MLFLOW_S3_ENDPOINT_URL
              value: {{ printf "http://%s-minio:9000" (include "mlflow.fullname" .) }}
          {{- end }}
          {{- range $key, $value := .Values.extraEnvVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "mlflow.fullname" . }}-env-configmap
            - secretRef:
                name: {{ include "mlflow.fullname" . }}-env-secret
            - secretRef:
                name: {{ include "mlflow.fullname" . }}-flask-server-secret-key
          {{- range .Values.extraSecretNamesForEnvFrom }}
            - secretRef:
                name: {{ . }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.auth.enabled }}
            - name: ini-file
              mountPath: {{ printf "%s/%s" (.Values.auth.configPath | trimSuffix "/") (default "basic_auth.ini" (.Values.auth.configFile | trimPrefix "/")) }}
              subPath: auth_result.ini
              readOnly: true
            {{- else if .Values.ldapAuth.enabled }}
            - name: ini-file
              mountPath: /etc/mlflow/auth/ldap_basic_auth.ini
              subPath: auth_result.ini
              readOnly: true
              {{- if or .Values.ldapAuth.encodedTrustedCACertificate .Values.ldapAuth.externalSecretForTrustedCACertificate }}
            - name: trusted-ca-cert-secret
              mountPath: /certs/ca.crt
              subPath: ca.crt
              readOnly: true
              {{- end }}
            {{- end }}
          {{- with .Values.extraVolumeMounts }}
            {{ toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.oauth2Proxy.enabled }}
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.oauth2Proxy.listenPort }}
              name: oauth2-proxy
          args:
            - --http-address=0.0.0.0:{{ .Values.oauth2Proxy.listenPort }}
            - --upstream=http://127.0.0.1:{{ .Values.service.containerPort }}
            - --provider={{ .Values.oauth2Proxy.provider.name | default "keycloak" }}
            {{- if .Values.oauth2Proxy.provider.issuerURL }}
            - --oidc-issuer-url={{ .Values.oauth2Proxy.provider.issuerURL }}
            {{- end }}
            {{- if .Values.oauth2Proxy.provider.redirectURL }}
            - --redirect-url={{ .Values.oauth2Proxy.provider.redirectURL }}
            {{- end }}
            {{- if .Values.oauth2Proxy.extraArgs }}
            {{- toYaml .Values.oauth2Proxy.extraArgs | nindent 12 }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.oauth2ProxySecretName" . }}
                  key: {{ .Values.oauth2Proxy.existingSecret.clientIDKey }}
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.oauth2ProxySecretName" . }}
                  key: {{ .Values.oauth2Proxy.existingSecret.clientSecretKey }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mlflow.oauth2ProxySecretName" . }}
                  key: {{ .Values.oauth2Proxy.existingSecret.cookieSecretKey }}
          {{- with .Values.oauth2Proxy.extraEnv }}
            {{- range $key, $val := . }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and (or .Values.backendStore.postgres.enabled .Values.backendStore.mysql.enabled .Values.backendStore.mssql.enabled .Values.postgresql.enabled .Values.mysql.enabled) .Values.backendStore.databaseConnectionCheck }}
        - name: dbchecker
          configMap:
            name: {{ include "mlflow.fullname" . }}-dbchecker
            defaultMode: 0777
        {{- end }}
        {{- if and (or .Values.backendStore.postgres.enabled .Values.backendStore.mysql.enabled .Values.backendStore.mssql.enabled .Values.postgresql.enabled .Values.mysql.enabled) .Values.backendStore.databaseMigration }}
        - name: migrations-config
          configMap:
            name: {{ include "mlflow.fullname" . }}-migrations
        {{- end }}
        {{- if or .Values.auth.enabled .Values.ldapAuth.enabled }}
        - name: ini-file
          emptyDir: {}
        - name: auth-ini-template-file
          configMap:
            name: {{ include "mlflow.fullname" . }}-auth-ini-template
          {{- if or .Values.ldapAuth.encodedTrustedCACertificate .Values.ldapAuth.externalSecretForTrustedCACertificate }}
        - name: trusted-ca-cert-secret
          secret:
            secretName: {{ default (printf "%s-trusted-ca-cert-secret" (include "mlflow.fullname" .)) .Values.ldapAuth.externalSecretForTrustedCACertificate }}
          {{- end }}
        {{- end }}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
