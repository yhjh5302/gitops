# yaml-language-server: $schema=values.schema.json
# Default values for mlflow.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- (int) Numbers of replicas
replicaCount: 1
# -- Image of mlflow
image:
  # -- The docker image repository to use
  repository: burakince/mlflow
  # -- The docker image pull policy
  pullPolicy: IfNotPresent
  # -- The docker image tag to use. Default app version
  tag: ""
  # -- Image digest in the format sha256:<hex>. When set, overrides the tag for immutable pulls.
  digest: ""
# -- mlflow init images
initImages:
  # -- dbchecker init container image configuration
  dbchecker:
    # -- dbchecker init container image repository to use
    repository: busybox
    # -- dbchecker init container image pull policy
    pullPolicy: IfNotPresent
    # -- dbchecker init container image tag to use
    tag: "1.38.0"
  # -- mlflow-db-migration init container image configuration
  mlflowDbMigration:
    # -- mlflow-db-migration init container image repository to use.
    repository: burakince/mlflow
    # -- mlflow-db-migration init container image pull policy.
    pullPolicy: IfNotPresent
    # -- mlflow-db-migration init container image tag to use. Default app version
    tag: ""
  # -- ini-file-initializer init container image configuration
  iniFileInitializer:
    # -- ini-file-initializer init container image repository to use
    repository: busybox
    # -- ini-file-initializer init container image pull policy
    pullPolicy: IfNotPresent
    # -- ini-file-initializer init container image tag to use
    tag: "1.38.0"
# -- This will set the deployment strategy more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
strategy:
  type: "RollingUpdate"
  rollingUpdate:
    maxSurge: "100%"
    maxUnavailable: 0
# -- Image pull secrets for private docker registry usages
imagePullSecrets: []
# -- String to override the default generated name
nameOverride: ""
# -- String to override the default generated fullname
fullnameOverride: ""
# -- The number of old ReplicaSets to retain for rollback. More information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#clean-up-policy
revisionHistoryLimit: ~
serviceAccount:
  # -- Specifies whether a ServiceAccount should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account. AWS EKS users can assign role arn from here.
  # Please find more information from here:
  # https://docs.aws.amazon.com/eks/latest/userguide/associate-service-account-role.html
  annotations: {}
  # eks.amazonaws.com/role-arn: ""

  # -- The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
# -- Annotations for the Deployment resource
deploymentAnnotations: {}
# -- Annotations for the pod
podAnnotations: {}
# -- Extra labels for the pod
extraPodLabels: {}
# -- This is for setting Security Context to a Pod. For more information checkout: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"
# -- This is for setting Security Context to a Container. For more information checkout: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  privileged: false
  runAsUser: 1001
  runAsGroup: 1001
# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- Specifies if you want to create a service
  enabled: true
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80
  # -- Port protocol name for the main HTTP port in the Service spec. This sets spec.ports[].name, not the Service resource name. To rename the Service resource itself use nameOverride or fullnameOverride.
  name: http
  # -- Default container port
  containerPort: 5000
  # -- Default container port name
  containerPortName: mlflow
  # -- Additional service annotations
  annotations: {}
# -- Mlflow logging settings
log:
  # -- Specifies if you want to enable mlflow logging.
  enabled: true
  # -- Mlflow logging level.
  level: info
# -- Mlflow Usage Tracking settings. More information can be found here: https://mlflow.org/docs/latest/community/usage-tracking/
telemetry:
  # -- Specifies if you want to enable collecting anonymized usage data about how core features of the platform are used.
  enabled: false
# -- Mlflow database connection settings
backendStore:
  # -- Specifies if you want to run database migration
  databaseMigration: false
  # -- Add an additional init container, which checks for database availability
  databaseConnectionCheck: false
  # -- Specifies the default sqlite path
  defaultSqlitePath: ":memory:"
  postgres:
    # -- Specifies if you want to use postgres backend storage
    enabled: false
    # -- Postgres host address. e.g. your RDS or Azure Postgres Service endpoint
    host: "" # required
    # -- Postgres service port
    port: 5432 # required
    # -- mlflow database name created before in the postgres instance
    database: "" # required
    # -- postgres database user name which can access to mlflow database
    user: "" # required
    # -- postgres database user password which can access to mlflow database
    password: "" # required
    # -- postgres database connection driver. e.g.: "psycopg2"
    driver: ""
  mysql:
    # -- Specifies if you want to use mysql backend storage
    enabled: false
    # -- MySQL host address. e.g. your Amazon RDS for MySQL
    host: "" # required
    # -- MySQL service port
    port: 3306 # required
    # -- mlflow database name created before in the mysql instance
    database: "" # required
    # -- mysql database user name which can access to mlflow database
    user: "" # required
    # -- mysql database user password which can access to mlflow database
    password: "" # required
    # -- mysql database connection driver. e.g.: "pymysql"
    driver: "pymysql"
  mssql:
    # -- Specifies if you want to use mssql backend storage
    enabled: false
    # -- mssql host address
    host: "" # required
    # -- mssql service port
    port: 1433 # required
    # -- mlflow database name created before in the mssql instance
    database: "" # required
    # -- mssql database user name which can access to mlflow database
    user: "" # required
    # -- mssql database user password which can access to mlflow database
    password: "" # required
    # -- mssql database connection driver. e.g.: "pymssql"
    driver: "pymssql"
    # -- Full SQLAlchemy connection URL for mssql (e.g. for Azure AD / MSI authentication with no embedded credentials).
    # When set, host/port/database/user/password are ignored and this URL is used directly as --backend-store-uri.
    # Example: "mssql+pyodbc://?odbc_connect=DRIVER%3D...%3BAuthentication%3DActiveDirectoryMsi%3B"
    connectionUrl: ""
    # -- Existing Kubernetes Secret containing the full MSSQL connection URL as a secret value.
    # Use this instead of connectionUrl when the connection string contains credentials.
    # The secret value is exposed as MSSQL_CONNECTION_URL and passed directly as --backend-store-uri.
    # Takes precedence over connectionUrl when name is set.
    existingConnectionUrlSecret:
      # -- Name of the existing secret
      name: ""
      # -- Key within the secret that holds the connection URL
      key: ""
  # -- Specifies if you want to use an existing database secret.
  existingDatabaseSecret:
    # -- The name of the existing database secret.
    name: ""
    # -- The key of the username in the existing database secret.
    usernameKey: "username"
    # -- The key of the password in the existing database secret.
    passwordKey: "password"
# -- Bitnami PostgreSQL configuration. For more information checkout: https://github.com/bitnami/charts/tree/main/bitnami/postgresql
postgresql:
  # -- Enable postgresql
  enabled: false
  architecture: standalone
  image:
    # -- This is temporary workaround because of bitnami's deprecation until to completely replace it with our solution.
    repository: bitnamilegacy/postgresql
  primary:
    service:
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      existingClaim: ""
  auth:
    username: ""
    password: ""
    # -- The name of the PostgreSQL database.
    database: "mlflow"
# -- Bitnami MySQL configuration. For more information checkout: https://github.com/bitnami/charts/tree/main/bitnami/mysql
mysql:
  # -- Enable mysql
  enabled: false
  architecture: standalone
  image:
    # -- This is temporary workaround because of bitnami's deprecation until to completely replace it with our solution.
    repository: bitnamilegacy/mysql
  primary:
    service:
      ports:
        mysql: 3306
    persistence:
      enabled: true
      existingClaim: ""
  auth:
    username: ""
    password: ""
    # -- The name of the MySQL database.
    database: "mlflow"
# Mlflow blob storage settings
artifactRoot:
  # -- Specifies if you want to enable proxied artifact storage access
  proxiedArtifactStorage: false
  # -- Specifies the default artifact root.
  defaultArtifactRoot: "./mlruns"
  # -- Specifies the default artifacts destination
  defaultArtifactsDestination: "./mlartifacts"
  # -- Specifies if you want to use Azure Blob Storage Mlflow Artifact Root
  azureBlob:
    # -- Specifies if you want to use Azure Blob Storage Mlflow Artifact Root
    enabled: false
    # -- Azure blob container name
    container: "" # required
    # -- Azure storage account name
    storageAccount: "" # required
    # -- Azure blob container folder. If you want to use root level, please don't set anything.
    path: "" # optional
    # -- Azure Cloud Connection String for the container. Only connectionString or accessKey required
    connectionString: "" # connectionString or accessKey required
    # -- Azure Cloud Storage Account Access Key for the container
    accessKey: "" # connectionString or accessKey required. Only connectionString or accessKey required
  # -- Specifies if you want to use AWS S3 Mlflow Artifact Root
  s3:
    # -- Specifies if you want to use AWS S3 Mlflow Artifact Root
    enabled: false
    # -- S3 bucket name
    bucket: "" # required
    # -- S3 bucket folder. If you want to use root level, please don't set anything.
    path: "" # optional
    # -- AWS IAM user AWS_ACCESS_KEY_ID which has attached policy for access to the S3 bucket
    awsAccessKeyId: "" # (awsAccessKeyId and awsSecretAccessKey) or roleArn serviceaccount annotation required
    # -- AWS IAM user AWS_SECRET_ACCESS_KEY which has attached policy for access to the S3 bucket
    awsSecretAccessKey: "" # (awsAccessKeyId and awsSecretAccessKey) or roleArn serviceaccount annotation required
    # -- Existing secret for AWS IAM user AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets.
    existingSecret:
      # -- This is for setting up the AWS IAM user secrets existing secret name.
      name: ""
      # -- Key in the existing secret that holds the AWS_ACCESS_KEY_ID value.
      keyOfAccessKeyId: "AWS_ACCESS_KEY_ID"
      # -- Key in the existing secret that holds the AWS_SECRET_ACCESS_KEY value.
      keyOfSecretAccessKey: "AWS_SECRET_ACCESS_KEY"
  # -- Specifies if you want to use Google Cloud Storage Mlflow Artifact Root
  gcs:
    # -- Specifies if you want to use Google Cloud Storage Mlflow Artifact Root
    enabled: false
    # -- Google Cloud Storage bucket name
    bucket: "" # required
    # -- Google Cloud Storage bucket folder. If you want to use root level, please don't set anything.
    path: "" # optional
# -- Mlflow Flask Server Secret Key. Default: Will be auto generated.
flaskServerSecretKey: ""
# -- Mlflow authentication settings
auth:
  # -- Specifies if you want to enable mlflow authentication. auth, ldapAuth, and oidcAuth can't be enabled at same time.
  enabled: false
  # -- Mlflow admin user username
  adminUsername: ""
  # -- Mlflow admin user password
  adminPassword: ""
  # -- Specifies if you want to use an existing admin credentials secret for auth. If it's set, adminUsername and adminPassword will be ignored.
  existingAdminSecret:
    # -- The name of the existing admin credentials secret.
    name: ""
    # -- The key of the admin username in the existing admin credentials secret.
    usernameKey: "username"
    # -- The key of the admin password in the existing admin credentials secret.
    passwordKey: "password"
  # -- Default permission for all users. More details: https://mlflow.org/docs/latest/auth/index.html#permissions
  defaultPermission: READ
  # -- Default registered authentication app name. If you want to use your custom authentication function, please look at: https://mlflow.org/docs/latest/auth/index.html#custom-authentication
  appName: "basic-auth"
  # -- Default authentication function
  authorizationFunction: "mlflow.server.auth:authenticate_request_basic_auth"
  # -- SQLite database file
  sqliteFile: "basic_auth.db"
  # -- SQLite database folder. Default is user home directory.
  sqliteFullPath: ""
  # -- Mlflow authentication INI configuration file path.
  configPath: "/etc/mlflow/auth/"
  # -- Mlflow authentication INI file
  configFile: "basic_auth.ini"
  # -- PostgreSQL based centrilised authentication database
  postgres:
    # -- Specifies if you want to use postgres auth backend storage
    enabled: false
    # -- Postgres host address. e.g. your RDS or Azure Postgres Service endpoint
    host: "" # required
    # -- Postgres service port
    port: 5432 # required
    # -- mlflow authorization database name created before in the postgres instance
    database: "" # required
    # -- postgres database user name which can access to mlflow authorization database
    user: "" # required
    # -- postgres database user password which can access to mlflow authorization database
    password: "" # required
    # -- postgres database connection driver. e.g.: "psycopg2"
    driver: ""
    # -- Specifies if you want to use an existing database secret for auth. If it's set, user and password will be ignored.
    existingSecret:
      # -- The name of the existing database secret.
      name: ""
      # -- The key of the username in the existing database secret.
      usernameKey: "username"
      # -- The key of the password in the existing database secret.
      passwordKey: "password"
# -- Basic Authentication with LDAP backend
ldapAuth:
  # -- Specifies if you want to enable mlflow LDAP authentication. auth, ldapAuth, and oidcAuth can't be enabled at same time.
  enabled: false
  # -- LDAP URI. e.g.: "ldap://lldap:3890/dc=mlflow,dc=test"
  uri: ""
  # -- TLS verification mode. Options: required, optional, none
  tlsVerification: required
  # -- LDAP Loopup Bind. e.g.: "uid=%s,ou=people,dc=mlflow,dc=test"
  lookupBind: ""
  # -- LDAP group attribute.
  groupAttribute: "dn"
  # -- Optional group attribute key for Active Directory users. e.g.: "attributes"
  groupAttributeKey: ""
  # -- LDAP base DN for the search. e.g.: "ou=groups,dc=mlflow,dc=test"
  searchBaseDistinguishedName: ""
  # -- LDAP query filter for search
  searchFilter: "(&(objectclass=groupOfUniqueNames)(uniquemember=%s))"
  # -- LDAP DN for the admin group. e.g.: "cn=test-admin,ou=groups,dc=mlflow,dc=test"
  adminGroupDistinguishedName: ""
  # -- LDAP DN for the user group. e.g.: "cn=test-user,ou=groups,dc=mlflow,dc=test"
  userGroupDistinguishedName: ""
  # -- Base64 encoded trusted CA certificate for LDAP server connection.
  encodedTrustedCACertificate: ""
  # -- External secret name for trusted CA certificate for LDAP server connection.
  externalSecretForTrustedCACertificate: ""
# -- Autoscaling settings. Can be enabled only when backendStore is not sqlite and artifactRoot is one of blob storage systems.
autoscaling:
  # -- If true, the number of replicas will be automatically scaled based on default metrics. On default, it will scale based on CPU and memory. For more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/"
  enabled: false
  # -- The minimum number of replicas.
  minReplicas: 1
  # -- The maximum number of replicas.
  maxReplicas: 5
  # -- The metrics to use for autoscaling.
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  # -- The behavior of the autoscaler. Only supported on K8s 1.18.0 or later.
  behavior: {}
  # scaleDown:
  #   stabilizationWindowSeconds: 300
  #   policies:
  #   - type: Percent
  #     value: 100
  #     periodSeconds: 15
  # scaleUp:
  #   stabilizationWindowSeconds: 0
  #   policies:
  #   - type: Percent
  #     value: 100
  #     periodSeconds: 15
  #   - type: Pods
  #     value: 4
  #     periodSeconds: 15
  #   selectPolicy: Max
# -- A map of arguments and values to pass to the `mlflow server` command. Keys must be camelcase. Helm will turn them to kebabcase style.
extraArgs: {}
# Number of gunicorn worker processes to handle requests (default: 4).
# workers: TEXT
# A prefix which will be prepended to the path of all static paths.
# It must always start with slash `/`
# e.g. /mlflow
# staticPrefix: TEXT
# Additional command line options forwarded to uvicorn processes (used by default).
# uvicornOpts: TEXT
# Additional command line options forwarded to gunicorn processes.
# gunicornOpts: TEXT
# Additional command line options for waitress-serve.
# waitressOpts: TEXT

# -- A list of flags to pass to `mlflow server` command. Items must be camelcase. Helm will turn them to kebabcase style.
extraFlags: []
# If specified, enables serving of artifact uploads, downloads, and list requests by routing these requests
# to the storage location that is specified by ‘–artifact-destination’ directly through a proxy.
# serveArtifacts
# If specified, configures the mlflow server to be used only for proxied artifact serving.
# artifactsOnly

# -- Extra environment variables
extraEnvVars: {}
# MLFLOW_S3_IGNORE_TLS: true  # Skip TLS certificate verification for S3
# MLFLOW_S3_UPLOAD_EXTRA_ARGS: '{"ServerSideEncryption": "aws:kms", "SSEKMSKeyId": "1234"}'  # Extra S3 upload arguments
# AWS_DEFAULT_REGION: my_region  # AWS default region
# MLFLOW_S3_ENDPOINT_URL: http://1.2.3.4:9000  # Custom S3 endpoint URL
# AWS_CA_BUNDLE: /some/ca/bundle.pem  # Custom CA bundle for AWS
# MLFLOW_GCS_DEFAULT_TIMEOUT: 60  # GCS transfer timeout in seconds - Sets the standard timeout for transfer operations in seconds (Default: 60). Use -1 for indefinite timeout.
# MLFLOW_GCS_UPLOAD_CHUNK_SIZE: 104857600  # GCS upload chunk size (100MB) - Sets the standard upload chunk size for bigger files in bytes (Default: 104857600 ≙ 100MiB), must be multiple of 256 KB.
# MLFLOW_GCS_DOWNLOAD_CHUNK_SIZE: 104857600  # GCS download chunk size (100MB) - Sets the standard download chunk size for bigger files in bytes (Default: 104857600 ≙ 100MiB), must be multiple of 256 K
# MLFLOW_SQLALCHEMYSTORE_POOL_SIZE: 10  # SQLAlchemy connection pool size
# MLFLOW_SQLALCHEMYSTORE_MAX_OVERFLOW: 20  # SQLAlchemy max overflow connections
# MLFLOW_SQLALCHEMYSTORE_POOL_RECYCLE: 3600  # SQLAlchemy pool recycle time

# -- Extra secrets for environment variables
extraSecretNamesForEnvFrom: []
# - my-mlflow-secrets

ingress:
  # -- Specifies if you want to create an ingress access
  enabled: false
  # -- New style ingress class name. Only possible if you use K8s 1.18.0 or later version
  className: ""
  # -- Additional ingress annotations
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          # -- Ingress path type
          pathType: ImplementationSpecific
  # -- Ingress tls configuration for https access
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
# -- List of allowed CORS origins for the MLflow server security middleware (env: MLFLOW_SERVER_CORS_ALLOWED_ORIGINS).
# When ingress is enabled, origins are automatically derived from ingress hosts: https:// if ingress.tls is configured, http:// otherwise.
# Set explicitly to override auto-detection (e.g. ["*"] for dev, or origins behind a load balancer with TLS termination before ingress).
# Requires uvicorn, which is the default server in MLflow 3.x.
corsAllowedOrigins: []
# -- List of allowed hostnames for the MLflow server security middleware (env: MLFLOW_SERVER_ALLOWED_HOSTS).
# When ingress is enabled, hostnames are automatically derived from ingress hosts.
# Set explicitly to override auto-detection (e.g. to add extra hostnames beyond the ingress host, or when not using ingress).
# Requires uvicorn, which is the default server in MLflow 3.x.
serverAllowedHosts: []
# -- Network interface the MLflow server binds to (passed as --host to `mlflow server`).
# Defaults to 0.0.0.0 (all interfaces). Set to 127.0.0.1 when using a sidecar proxy (e.g. oauth2Proxy)
# so that MLflow is only reachable through the proxy and not directly from outside the pod.
serverHost: "0.0.0.0"
# -- This block is for setting up the resource management for the pod more information can be found here: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

serviceMonitor:
  # -- When set true then use a ServiceMonitor to configure scraping
  enabled: false
  # -- When set true then use a service port. On default use a pod port.
  useServicePort: false
  # -- Set the namespace the ServiceMonitor should be deployed
  namespace: monitoring
  # -- Set how frequently Prometheus should scrape
  interval: 30s
  # -- Set path to mlflow telemetry-path
  telemetryPath: /metrics
  # -- Set labels for the ServiceMonitor, use this to define your scrape label for Prometheus Operator
  labels:
    # -- default `kube prometheus stack` helm chart serviceMonitor selector label
    # Mostly it's your prometheus helm release name. Please find more information from here:
    # https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/platform/troubleshooting.md#troubleshooting-servicemonitor-changes
    release: prometheus
  # -- Set timeout for scrape
  timeout: 10s
  # -- Set of labels to transfer on the Kubernetes Service onto the target.
  targetLabels: []
  # -- Set of rules to relabel your exist metric labels
  metricRelabelings: []
  # - sourceLabels: [prometheus_replica]
  #   regex: (.*)
  #   targetLabel: another_prometheus_replica
  #   action: replace
  # - regex: prometheus_replica
  #   action: labeldrop
# -- For more information checkout: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector
nodeSelector: {}
# -- For more information checkout: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
tolerations: []
# -- For more information checkout: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
affinity: {}
# -- For more information checkout: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
priorityClassName: ""
# -- Array of extra Kubernetes objects to deploy alongside the chart (e.g. SecretStore, ExternalSecret). Supports Helm templating via tpl.
extraDeploy: []
# -- Init Containers for Mlflow Pod
initContainers: []
# -- Extra containers for the mlflow pod
extraContainers: []
# -- Extra Volumes for the pod
extraVolumes: []
# - name: mlflow-volume
#   persistentVolumeClaim:
#     claimName: mlflow-pv-volume
# - name: example
#   configMap:
#     name: example

# -- Extra Volume Mounts for the mlflow container
extraVolumeMounts: []
# - name: mlflow-volume
#   mountPath: /mlflow/data
# - name: example
#   mountPath: /example

# -- Liveness probe configurations. Please look to [here](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes).
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 5
# -- Readiness probe configurations. Please look to [here](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes).
readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 5
# -- oauth2-proxy sidecar configuration
oauth2Proxy:
  # -- Enable deploying oauth2-proxy as a sidecar to the mlflow pod
  enabled: false
  # -- If true the chart will create a Kubernetes secret with the oauth client id/secret
  createSecret: false
  # -- Reference a pre-existing secret instead of creating one.
  # All key name fields below are used both when creating and when referencing an existing secret.
  existingSecret:
    # -- Name of the pre-existing secret; if empty the chart creates one when createSecret is true
    name: ""
    # -- Secret key that holds the OAuth2 client ID
    clientIDKey: "client-id"
    # -- Secret key that holds the OAuth2 client secret
    clientSecretKey: "client-secret"
    # -- Secret key that holds the cookie secret
    cookieSecretKey: "cookie-secret"
  # -- OAuth2 Proxy image
  image:
    # -- OAuth2 Proxy image repository
    repository: quay.io/oauth2-proxy/oauth2-proxy
    # -- OAuth2 Proxy image tag
    tag: v7.15.3
    # -- OAuth2 Proxy image pull policy
    pullPolicy: IfNotPresent
  # Upstream is constructed from the mlflow service container port;
  # the chart sets: --upstream=http://127.0.0.1:<service.containerPort>
  # -- Port oauth2-proxy listens on inside the pod
  listenPort: 4180
  # -- Cookie secret plaintext value — only used when createSecret is true
  cookieSecret: ""
  # -- Provider specific settings (example: keycloak)
  provider:
    # -- Provider name (e.g. keycloak, keycloak-oidc, google, github)
    name: keycloak
    # -- OIDC issuer URL for the provider
    issuerURL: ""
    # -- OAuth2 client ID
    clientID: ""
    # -- OAuth2 client secret — prefer existingSecret for production
    clientSecret: ""
    # -- OAuth2 redirect / callback URL
    redirectURL: ""
  # -- Extra args to pass to oauth2-proxy as flags
  extraArgs:
    - "--cookie-secure=true"
    - "--cookie-samesite=lax"
  # -- Extra environment variables for oauth2-proxy
  extraEnv: {}
  # -- Resources for the oauth2-proxy container
  resources: {}
# -- OIDC Authentication via the mlflow-oidc-auth plugin (already bundled in the burakince/mlflow image).
# Mutually exclusive with auth, ldapAuth, and oauth2Proxy — enable only one auth mechanism.
oidcAuth:
  # -- Enable built-in OIDC authentication (adds --app-name oidc-auth to the mlflow server command)
  enabled: false
  # -- OIDC discovery URL (env: OIDC_DISCOVERY_URL)
  # e.g. https://keycloak/realms/mlflow/.well-known/openid-configuration
  discoveryUrl: ""
  # -- OIDC client ID (env: OIDC_CLIENT_ID)
  clientId: ""
  # -- OIDC client secret — use existingSecret for production (env: OIDC_CLIENT_SECRET)
  clientSecret: ""
  # -- Reference a pre-existing secret instead of creating one from clientSecret above
  existingSecret:
    # -- Name of the pre-existing secret; if empty the chart creates one from clientSecret
    name: ""
    # -- Key in the secret that holds the OIDC client secret value
    clientSecretKey: "OIDC_CLIENT_SECRET"
  # -- Optional redirect URI; auto-detected from request headers when empty (env: OIDC_REDIRECT_URI)
  redirectUri: ""
  # -- Scopes requested from the OIDC provider (env: OIDC_SCOPE)
  scope: "openid,email,profile"
  # -- Optional audience claim validation (env: OIDC_AUDIENCE)
  audience: ""
  # -- Display name on the Login button in the MLflow UI (env: OIDC_PROVIDER_DISPLAY_NAME)
  providerDisplayName: "Login with OIDC"
  # -- JWT claim that contains group memberships (env: OIDC_GROUPS_ATTRIBUTE)
  groupsAttribute: "groups"
  # -- Groups whose members are allowed to access MLflow (env: OIDC_GROUP_NAME)
  groupName:
    - mlflow
  # -- Groups whose members receive admin/MANAGE permission (env: OIDC_ADMIN_GROUP_NAME)
  adminGroupName:
    - mlflow-admin
  # -- Default permission for authenticated users: NO_PERMISSIONS / READ / EDIT / MANAGE (env: DEFAULT_MLFLOW_PERMISSION)
  defaultPermission: "MANAGE"
  # -- Require HTTPS for session cookies; set false only in local/dev environments (env: SESSION_COOKIE_SECURE)
  sessionCookieSecure: true
  # -- SameSite policy for session cookies: lax / strict / none (env: SESSION_COOKIE_SAMESITE)
  sessionCookieSamesite: "lax"
  # -- Shared cache backend for multi-replica deployments (requires mlflow-oidc-auth[cache], already in image)
  cache:
    # -- Set true to use Redis instead of in-process TTLCache (env: CACHE_BACKEND)
    enabled: false
    # -- Redis connection URL (env: CACHE_REDIS_URL)
    redisUrl: ""
    # -- Cache key prefix to avoid collisions when sharing a Redis instance (env: CACHE_KEY_PREFIX)
    keyPrefix: "mlflow_oidc_auth:"
  # -- OIDC user/permission database — separate from the MLflow tracking store.
  # Defaults to sqlite:///auth.db when postgres is not enabled and uri is empty.
  database:
    # -- Full URI override (env: OIDC_USERS_DB_URI); takes precedence over postgres block when set.
    # Example: postgresql+psycopg2://user:pass@host:5432/oidc_users
    uri: ""
    postgres:
      # -- Use PostgreSQL for the OIDC user/permission database
      enabled: false
      # -- Postgres host for the OIDC user/permission database
      host: ""
      # -- Postgres port for the OIDC user/permission database
      port: 5432
      # -- Database name for the OIDC user/permission database
      database: ""
      # -- Postgres driver (e.g. psycopg2; leave empty for the default)
      driver: ""
      # -- Postgres username for the OIDC user/permission database
      user: ""
      # -- Postgres password for the OIDC user/permission database — prefer existingSecret for production
      password: ""
      # -- Reference a pre-existing DB credentials secret instead of using user and password above
      existingSecret:
        # -- Name of the pre-existing DB credentials secret; if empty the chart creates one
        name: ""
        # -- Key in the secret that holds the database username
        usernameKey: "username"
        # -- Key in the secret that holds the database password
        passwordKey: "password"
  # -- List of trusted proxy IPs/CIDRs (e.g. ingress controller CIDR).
  # Required when MLflow runs behind an ingress; fixes redirect URI auto-detection. (env: TRUSTED_PROXIES)
  trustedProxies: []
# -- MinIO subchart for S3-compatible local artifact storage.
# When enabled, the MLflow deployment automatically receives AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY, and MLFLOW_S3_ENDPOINT_URL from the MinIO secret and service.
# artifactRoot.s3.enabled must also be set to true with a matching bucket name.
minio:
  # -- Enable the MinIO subchart
  enabled: false
  # -- MinIO mode
  mode: standalone
  # -- Minio deployment update strategy
  deploymentUpdate:
    type: Recreate
  # -- Minio statefulset update strategy
  statefulSetUpdate:
    updateStrategy: Recreate
  # -- Number of drives attached to a node
  drivesPerNode: 1
  # -- Number of MinIO containers running
  replicas: 1
  # -- Number of expanded MinIO clusters
  pools: 1
  # -- MinIO root user (access key). Length must be at least 3 characters.
  rootUser: ""
  # -- MinIO root password (secret key). Length must be at least 8 characters.
  rootPassword: ""
  # -- MinIO model bucket policy.
  policies: []
  # - name: modelspolicy
  #   statements:
  #     - resources:
  #         - 'arn:aws:s3:::models*/*'
  #       actions:
  #         - "s3:AbortMultipartUpload"
  #         - "s3:GetObject"
  #         - "s3:DeleteObject"
  #         - "s3:PutObject"
  #         - "s3:ListMultipartUploadParts"
  #     - resources:
  #         - 'arn:aws:s3:::models*'
  #       actions:
  #         - "s3:CreateBucket"
  #         - "s3:DeleteBucket"
  #         - "s3:GetBucketLocation"
  #         - "s3:ListBucket"
  #         - "s3:ListBucketMultipartUploads"

  # -- MinIO users
  users: []
  #   ## Username, password and policy to be assigned to the user
  #   ## Default policies are [readonly|readwrite|writeonly|consoleAdmin|diagnostics]
  #   ## Add new policies as explained here https://docs.min.io/docs/minio-multi-user-quickstart-guide.html
  #   ## NOTE: this will fail if LDAP is enabled in your MinIO deployment
  #   ## make sure to disable this if you are using LDAP.
  #   #- accessKey: mlflow
  #   #  secretKey: console123
  #   #  policy: consoleAdmin
  #   # Or you can use models policy but it must be also enabled.
  #   - accessKey: mlflow
  #     secretKey: my-super-secret
  #     policy: modelspolicy
  #   # Or you can refer to specific secret
  #   #- accessKey: externalSecret
  #   #  existingSecret: my-secret
  #   #  existingSecretKey: password
  #   #  policy: readonly

  # -- Buckets to create on startup
  buckets:
    - name: mlflow
      policy: none
      purge: false
  # -- MinIO resources
  resources:
    # -- MinIO requests
    requests:
      # -- MinIO memory request
      memory: 1Gi
  # -- MinIO persistence settings
  persistence:
    # -- Enable persistent storage for MinIO. Disable for ephemeral/test deployments.
    enabled: true
    # -- Minio persistence annotations
    annotations: {}
    # -- Minio persistence existing claim
    existingClaim: ""
    # -- Minio persistence storage class
    storageClass: ""
    # -- Minio persistence volume name
    volumeName: ""
    # -- Minio persistence access mode
    accessMode: ReadWriteOnce
    # -- Minio persistence size
    size: 10Gi
    # -- Minio persistence sub path
    subPath: ""
